<style>
:root{
  --navy-800:#1B2F4C; --navy-900:#11203A; --navy-700:#294169; --navy-border:#385686;
  --off-white:#F2F3F4; --white:#FFFFFF;
  --blue-600:#1D3EA9; --blue-700:#16318C; --blue-500:#2E52C9; --blue-100:#E5EAF8;
  --coral-500:#FA624D; --coral-700:#D8412E; --coral-200:#FFC8BF; --coral-100:#FFE7E1;
  --mint-500:#64F4C9; --mint-700:#1F9E7E; --mint-200:#C0FBEC; --mint-100:#E2FBF4;
  --amber-600:#E29A14; --amber-700:#C2820A; --amber-100:#FEF2D7;
  --grey-50:#F7F8F9; --grey-100:#ECEEF0; --grey-200:#DCE0E4; --grey-300:#C3C9D0;
  --grey-400:#969FAB; --grey-500:#6B7685; --grey-600:#4C5868; --grey-700:#33404F;
  --muted-on-navy:#A7B2C2;
  --font-display:'Oswald',system-ui,sans-serif;
  --font-body:'Montserrat',system-ui,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}
html,body{margin:0;padding:0;background:var(--off-white);}
*{box-sizing:border-box;}
body{font-family:var(--font-body);color:var(--grey-700);}
@keyframes nloFadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
input,select,textarea,button{font-family:var(--font-body);}
input:focus,select:focus,textarea:focus{outline:2px solid var(--blue-500);outline-offset:1px;}
.disp{font-family:var(--font-display);text-transform:uppercase;}
.fadeup{animation:nloFadeUp .25s ease;}
.fadeup-fast{animation:nloFadeUp .2s ease;}
.hov-cell:hover{box-shadow:0 4px 14px rgba(27,47,76,.14);}
.hov-grey:hover{background:var(--grey-100);}
.hov-navy7:hover{background:var(--navy-700);}
.hov-coral7:hover{background:var(--coral-700) !important;}
.hov-blue7:hover{background:var(--blue-700) !important;}
.hov-navy9:hover{background:var(--navy-900) !important;}
.hov-coral1:hover{background:var(--coral-100);}
.hov-amber7:hover{background:var(--amber-700) !important;}
.hov-staffpill:hover{background:var(--navy-700);color:#F2F3F4 !important;}
button{cursor:pointer;}
.pill-btn{border:none;border-radius:999px;font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.08em;}
@media (max-width:700px){
  .month-cell{min-height:74px !important;}
  .detail-panel{width:100vw !important;}
}
</style>

/* ================= DATE HELPERS ================= */
function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parseD(s){ const p=s.split("-").map(Number); return new Date(p[0],p[1]-1,p[2]); }
function addDays(s,n){ const d=parseD(s); d.setDate(d.getDate()+n); return fmt(d); }
function todayStr(){ return fmt(new Date()); }
function weekStart(s){ const d=parseD(s); const off=(d.getDay()+6)%7; return addDays(s,-off); }
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const SMON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
function isClosedDay(s){ const g=parseD(s).getDay(); return g===5||g===6||g===0; }
function prettyDate(s){ const d=parseD(s); return SMON[d.getMonth()]+" "+d.getDate(); }
function prettyRange(a,b){
  if(!b||b===a) return prettyDate(a);
  const da=parseD(a),db=parseD(b);
  if(da.getMonth()===db.getMonth()&&da.getFullYear()===db.getFullYear()) return SMON[da.getMonth()]+" "+da.getDate()+"–"+db.getDate();
  return prettyDate(a)+" – "+prettyDate(b);
}
function fmtTime(t){
  if(!t) return "";
  const p=t.split(":").map(Number);
  const h12=((p[0]+11)%12)+1, ampm=p[0]>=12?"PM":"AM";
  return h12+(p[1]?":"+String(p[1]).padStart(2,"0"):"")+" "+ampm;
}
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ================= FIXED HOLIDAYS (fallback — mirrors backend/handbook) ================= */
function nthWeekday(y,m,wd,n){ const first=new Date(y,m,1); const off=(wd-first.getDay()+7)%7; return new Date(y,m,1+off+(n-1)*7); }
function lastWeekday(y,m,wd){ const last=new Date(y,m+1,0); const off=(last.getDay()-wd+7)%7; return new Date(y,m,last.getDate()-off); }
function fixedHolidaysForYear(y){
  const out={};
  out[fmt(new Date(y,0,1))]="New Year's Day";
  out[fmt(lastWeekday(y,4,1))]="Memorial Day";
  out[fmt(new Date(y,6,4))]="Independence Day";
  out[fmt(nthWeekday(y,8,1,1))]="Labor Day";
  const thx=nthWeekday(y,10,4,4);
  const before=new Date(thx); before.setDate(thx.getDate()-1);
  const after=new Date(thx); after.setDate(thx.getDate()+1);
  out[fmt(before)]="Day Before Thanksgiving";
  out[fmt(thx)]="Thanksgiving Day";
  out[fmt(after)]="Day After Thanksgiving";
  out[fmt(new Date(y,11,25))]="Christmas Day";
  return out;
}
function holidayMap(){
  const map={};
  if(S.sync.holidays && S.sync.holidays.length){
    S.sync.holidays.forEach(h=>{ if(h&&h.date) map[String(h.date).slice(0,10)]={label:h.label||"Day Off",source:h.source||"custom"}; });
  } else {
    const y=new Date().getFullYear();
    [y-1,y,y+1].forEach(yy=>{ const f=fixedHolidaysForYear(yy); Object.keys(f).forEach(k=>{ map[k]={label:f[k],source:"fixed"}; }); });
  }
  return map;
}

/* ================= ENTRY QUERIES ================= */
function occursOn(e,ds){
  if(e.recurrence){
    if(ds<e.startDate) return false;
    const d=parseD(ds), b=parseD(e.startDate);
    if(d.getDate()!==b.getDate()) return false;
    if(e.recurrence==="monthly") return true;
    const mdiff=(d.getFullYear()-b.getFullYear())*12+(d.getMonth()-b.getMonth());
    if(e.recurrence==="quarterly") return mdiff%3===0;
    if(e.recurrence==="yearly") return d.getMonth()===b.getMonth();
    return false;
  }
  const end=e.endDate||e.startDate;
  return ds>=e.startDate && ds<=end;
}

function entriesFor(ds,ignoreFilters){
  const data=S.data; if(!data) return [];
  const out=[];
  /* holiday (from Time-Off backend / handbook) */
  const hol=holidayMap()[ds];
  if(hol) out.push({ id:"hol_"+ds, type:"holiday", title:hol.label, startDate:ds, endDate:ds, time:null,
                     notes: hol.source==="fixed" ? "Office closed — paid holiday (policy manual)" : "Office closed",
                     recurrence:null, synced:true });
  /* manual calendar entries */
  Object.keys(data.events).forEach(id=>{
    const e=data.events[id];
    if(!ignoreFilters && S.filters[e.type]===false) return;
    if(e.type==="pto" && officeClosed(ds)) return; // office is closed — PTO doesn't apply
    if(occursOn(e,ds)) out.push(Object.assign({id},e));
  });
  /* approved time off synced from the Time-Off Request app */
  if((ignoreFilters || S.filters.pto) && !officeClosed(ds)){
      S.sync.timeOff.forEach((r,i)=>{
        const start=String(r.start||"").slice(0,10), end=String(r.end||r.start||"").slice(0,10);
        if(!start) return;
        if(ds>=start && ds<=(end||start)){
          out.push({ id:"to_"+(r.id||i), type:"pto", title:r.requestType||r.reason||"PTO",
                     staffId:null, staffName:r.employeeName||"PTO",
                     startDate:start, endDate:end||start, time:null,
                     notes:(r.paidType?String(r.paidType):"")+(r.hours?(" · "+r.hours+" hrs"):""),
                     recurrence:null, synced:true });
        }
    });
  }
  const order={holiday:0,pto:1,event:2,task:3};
  out.sort((a,b)=>(order[a.type]-order[b.type])||String(a.time||"").localeCompare(String(b.time||""))||String(a.title).localeCompare(b.title));
  return out;
}

function typeColors(t){
  if(t==="pto")     return {bg:"#FFE7E1",fg:"#C13A28",edge:"#FA624D",glyph:"●",label:"PTO"};
  if(t==="task")    return {bg:"#FEF2D7",fg:"#996709",edge:"#E29A14",glyph:"▲",label:"Task"};
  if(t==="holiday") return {bg:"#1B2F4C",fg:"#FFFFFF",edge:"#1B2F4C",glyph:"★",label:"Holiday"};
  return {bg:"#E5EAF8",fg:"#16318C",edge:"#1D3EA9",glyph:"■",label:"Event"};
}
function entryLabel(e){ return e.type==="pto"?(e.staffName||"PTO"):e.title; }
function entrySub(e){
  if(e.type==="pto"){
    let s="Out "+prettyRange(e.startDate,e.endDate);
    if(e.synced) s+=" · Time-Off app";
    return s;
  }
  if(e.type==="holiday") return "Office closed";
  const parts=[e.time?fmtTime(e.time):"All day"];
  if(e.recurrence) parts.push("repeats "+e.recurrence);
  return parts.join(" · ");
}
function isBlackout(ds){ const s=S.data&&S.data.settings; return !!(s&&s.blackoutDates&&s.blackoutDates[ds]); }
/* office is closed Fri/Sat/Sun and on holidays — PTO is meaningless on those days */
function officeClosed(ds){ return isClosedDay(ds) || !!holidayMap()[ds]; }
function nextOpenDay(ds){ let d=ds,i=0; while(officeClosed(d)&&i<14){ d=addDays(d,1); i++; } return d; }
function adminDayOf(ds){ return (S.data&&S.data.adminDays&&S.data.adminDays[ds])||null; } // 'admin' | 'meeting' | null

  const d=ds||todayStr();
  return {id:null,type:"event",title:"",staffId:"",startDate:d,endDate:d,allDay:true,time:"09:00",notes:"",recurrence:""};

function readFormDom(){
  const f=S.form; if(!f) return;
  const g=id=>document.getElementById(id);
  if(g("f-title")) f.title=g("f-title").value;
  if(g("f-staff")) f.staffId=g("f-staff").value;
  if(g("f-start")) f.startDate=g("f-start").value||f.startDate;
  if(g("f-end")) f.endDate=g("f-end").value||f.endDate;
  if(g("f-time")) f.time=g("f-time").value||f.time;
  if(g("f-rec")) f.recurrence=g("f-rec").value;
  if(g("f-notes")) f.notes=g("f-notes").value;
  if(g("f-allday")) f.allDay=g("f-allday").checked;
}
function saveEntry(force){
  readFormDom();
  const f=S.form, data=S.data;
  if(f.type==="pto"&&!f.staffId){ S.formError="Pick a staff member for PTO."; S.blackoutWarn=false; return render(); }
  if(f.type!=="pto"&&!f.title.trim()){ S.formError="Give this entry a title."; S.blackoutWarn=false; return render(); }
  if(!f.startDate){ S.formError="Start date is required."; S.blackoutWarn=false; return render(); }
  let end=f.endDate||f.startDate;
  if(end<f.startDate) end=f.startDate;
  if(f.type==="pto"&&!force){
    let ds=f.startDate,hit=false;
    while(ds<=end){ if(isBlackout(ds)){hit=true;break;} ds=addDays(ds,1); }
    if(hit){ S.blackoutWarn=true; S.formError=""; return render(); }
  }
  const staff=f.staffId?data.staff[f.staffId]:null;
  const rec={
    type:f.type,
    title:f.type==="pto"?(f.title.trim()||"PTO"):f.title.trim(),
    staffId:f.type==="pto"?f.staffId:null,
    staffName:f.type==="pto"&&staff?staff.name:null,
    startDate:f.startDate, endDate:end,
    time:f.type==="event"&&!f.allDay?f.time:null,
    notes:f.notes.trim(),
    recurrence:f.type==="task"&&f.recurrence?f.recurrence:null,
    createdAt:Date.now()
  };
  const id=f.id||("e"+Date.now()+Math.floor(Math.random()*999));
  if(f.id&&data.events[f.id]) rec.createdAt=data.events[f.id].createdAt;
  fbSet("events/"+id,rec);
  S.entryOpen=false; S.form=null; S.blackoutWarn=false; S.formError="";
  render();
}
function deleteEntry(id){
  if(!window.confirm("Delete this entry?")) return;
  fbRemove("events/"+id);
  S.entryOpen=false; S.form=null;
  render();
}

  const cur=adminDayOf(ds);

function renderMonth(today,cd){
  let h=`<div class="fadeup" style="padding:8px 24px 28px;">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:0 8px;padding:0 0 6px;">`;
  ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].forEach((n,i)=>{
    h+=`<div class="disp" style="font-weight:600;letter-spacing:.12em;font-size:13px;color:${i>3?"#969FAB":"#4C5868"};text-align:left;padding:4px 10px;">${n}</div>`;
  });
  h+=`</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;">`;
  const first=new Date(cd.getFullYear(),cd.getMonth(),1);
  const gridStart=weekStart(fmt(first));
  for(let i=0;i<42;i++){
    const ds=addDays(gridStart,i);
    const d=parseD(ds);
    const inMonth=d.getMonth()===cd.getMonth();
    const isToday=ds===today;
    const closed=isClosedDay(ds);
    const blackout=isBlackout(ds);
    const entries=entriesFor(ds);
    const MAX=3;
    const ad=adminDayOf(ds);
    const adTint=ad==="meeting"?"#FFE7E1":"#E2FBF4";
    const bg=blackout?"repeating-linear-gradient(135deg,#ECEEF0 0 6px,#F7F8F9 6px 12px)":(ad?adTint:(closed?"#F0F1F3":"#FFFFFF"));
    h+=`<div data-act="open-day" data-date="${ds}" class="hov-cell month-cell" style="position:relative;min-height:118px;border-radius:12px;padding:8px;cursor:pointer;display:flex;flex-direction:column;gap:4px;overflow:hidden;border:${isToday?"2px solid #1D3EA9":(ad?("1px solid "+(ad==="meeting"?"#FFC8BF":"#C0FBEC")):"1px solid #DCE0E4")};background:${bg};opacity:${inMonth?"1":"0.45"};">`;
    if(ad) h+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;"><span class="disp" style="transform:rotate(-16deg);font-weight:700;font-size:15px;letter-spacing:.16em;color:${ad==="meeting"?"#D8412E":"#1F9E7E"};opacity:.45;white-space:nowrap;">${ad==="meeting"?"Admin + Mtg":"Admin Day"}</span></div>`;
    h+=`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">

    if(blackout) h+=`<span class="disp" style="font-weight:600;letter-spacing:.1em;font-size:10px;background:var(--navy-800);color:#fff;border-radius:4px;padding:2px 6px;">No PTO</span>`;
    h+=`</div>`;
    entries.slice(0,MAX).forEach(e=>{
      const c=typeColors(e.type);
      const label=e.type==="event"&&e.time?fmtTime(e.time)+" "+entryLabel(e):entryLabel(e);
      h+=`<div style="font-size:13px;font-weight:600;border-radius:6px;padding:3px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;background:${c.bg};color:${c.fg};"><span style="font-size:9px;flex:none;">${c.glyph}</span><span style="overflow:hidden;text-overflow:ellipsis;">${esc(label)}</span></div>`;
    });
    if(entries.length>MAX) h+=`<div style="font-size:12px;font-weight:600;color:var(--grey-500);padding:0 8px;">+${entries.length-MAX} more</div>`;
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function renderWeek(today,cursor){
  const ws=weekStart(cursor);

    const adW=adminDayOf(ds);
    const weekBg=adW?(adW==="meeting"?"#FFE7E1":"#E2FBF4"):(closed?"#F0F1F3":"#FFFFFF");
    h+=`<div data-act="open-day" data-date="${ds}" class="hov-cell" style="border-radius:14px;min-height:380px;padding:12px;display:flex;flex-direction:column;gap:8px;cursor:pointer;border:${isToday?"2px solid #1D3EA9":"1px solid #DCE0E4"};background:${weekBg};">
      <div style="display:flex;align-items:baseline;gap:8px;border-bottom:1px solid var(--grey-200);padding-bottom:8px;">
        <span class="disp" style="font-weight:600;letter-spacing:.1em;font-size:13px;color:${isToday?"#1D3EA9":"#6B7685"};">${DAYS[d.getDay()].slice(0,3)}</span>
        <span style="font-weight:700;font-size:20px;color:${isToday?"#1D3EA9":"#1B2F4C"};">${d.getDate()}</span>`;
    if(closed) h+=`<span style="font-size:11px;font-weight:600;color:var(--grey-400);text-transform:uppercase;letter-spacing:.08em;">Closed</span>`;
    h+=`</div>`;
    if(blackout) h+=`<span class="disp" style="font-weight:600;letter-spacing:.1em;font-size:11px;background:var(--navy-800);color:#fff;border-radius:4px;padding:3px 8px;align-self:flex-start;">No PTO — blackout</span>`;
    if(adminDayOf(ds)) h+=`<div style="align-self:flex-start;">${adminDayTag(ds)}</div>`;
    entriesFor(ds).forEach(e=>{
      const c=typeColors(e.type);
      h+=`<div style="border-radius:8px;padding:8px 10px;background:${c.bg};">
        <div style="display:flex;align-items:center;gap:7px;font-weight:700;font-size:14px;color:${c.fg};"><span style="font-size:9px;flex:none;">${c.glyph}</span><span>${esc(entryLabel(e))}</span></div>
        <div style="font-size:12.5px;font-weight:500;margin-top:2px;color:${c.fg};opacity:.85;">${esc(entrySub(e))}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div></div>`;
  return h;
}

function renderAgenda(today,cursor){
  let h=`<div class="fadeup" style="padding:8px 24px 40px;max-width:860px;width:100%;margin:0 auto;">`;
  let count=0;
  for(let i=0;i<45;i++){
    const ds=addDays(cursor,i);
    const entries=entriesFor(ds);
    const ad=adminDayOf(ds);
    if(!entries.length&&!ad) continue;
    count++;
    const d=parseD(ds);
    const isToday=ds===today;
    h+=`<div style="margin-bottom:22px;">
      <div data-act="open-day" data-date="${ds}" style="display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;">
        <span class="disp" style="font-weight:700;letter-spacing:.06em;font-size:20px;color:${isToday?"#1D3EA9":"#1B2F4C"};">${DAYS[d.getDay()]} · ${SMON[d.getMonth()]} ${d.getDate()}</span>`;
    if(isToday) h+=`<span class="disp" style="font-weight:600;letter-spacing:.1em;font-size:12px;background:var(--blue-600);color:#fff;border-radius:999px;padding:3px 12px;">Today</span>`;
    if(isBlackout(ds)) h+=`<span class="disp" style="font-weight:600;letter-spacing:.1em;font-size:12px;background:var(--navy-800);color:#fff;border-radius:4px;padding:3px 10px;">No PTO</span>`;
    h+=adminDayTag(ds);
    h+=`<div style="flex:1;height:1px;background:var(--grey-200);"></div></div>
      <div style="display:flex;flex-direction:column;gap:8px;">`;
    entries.forEach(e=>{
      const c=typeColors(e.type);
      const timeLabel=e.time?fmtTime(e.time):(e.type==="pto"?prettyRange(e.startDate,e.endDate):"All day");
      h+=`<div style="background:var(--white);border:1px solid var(--grey-200);border-left:6px solid ${c.edge};border-radius:10px;padding:14px 16px;display:flex;gap:14px;align-items:baseline;">
        <span style="font-family:var(--font-mono);font-size:14px;font-weight:500;color:var(--grey-500);min-width:76px;flex:none;">${esc(timeLabel)}</span>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:700;font-size:17px;color:var(--navy-800);">${esc(entryLabel(e))}</div>`;
      if(e.notes) h+=`<div style="font-size:14px;color:var(--grey-500);margin-top:3px;">${esc(e.notes)}</div>`;
      h+=`</div><span style="font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;flex:none;color:${c.edge};">${c.label}</span>
      </div>`;
    });
    h+=`</div></div>`;
  }
  if(count===0) h+=`<div style="text-align:center;padding:60px 20px;color:var(--grey-500);font-size:16px;">Nothing scheduled in the next 45 days.</div>`;
  h+=`</div>`;
  return h;
}

function renderDetail(today,dd){
  const d=parseD(dd);
  const ad=adminDayOf(dd);
  const hol=holidayMap()[dd];
  let sub=(dd===today?"Today · ":"")+(hol?("Office closed — "+hol.label):(isClosedDay(dd)?"Office closed (Mon–Thu 8–5)":"Office open 8 AM – 5 PM"));
  const list=entriesFor(dd);
  let h=`<div data-act="close-detail" style="position:fixed;inset:0;background:rgba(17,32,58,.42);z-index:60;"></div>
  <div class="fadeup-fast detail-panel" style="position:fixed;top:0;right:0;bottom:0;width:min(420px,100vw);background:#fff;z-index:61;box-shadow:-12px 0 40px rgba(17,32,58,.25);display:flex;flex-direction:column;">
    <div style="background:var(--navy-800);color:#F2F3F4;padding:20px 22px;display:flex;align-items:flex-start;gap:12px;">
      <div style="flex:1;">
        <div class="disp" style="font-weight:700;font-size:26px;line-height:1.05;">${DAYS[d.getDay()]}, ${SMON[d.getMonth()]} ${d.getDate()}</div>
        <div style="font-size:14px;color:#A7B2C2;margin-top:4px;">${esc(sub)}</div>
      </div>
      <button data-act="close-detail" aria-label="Close" style="border:none;background:var(--navy-700);color:#F2F3F4;border-radius:999px;width:34px;height:34px;font-size:16px;">✕</button>
    </div>`;
  if(isBlackout(dd)) h+=`<div class="disp" style="background:var(--navy-800);color:#E29A14;padding:8px 22px;font-size:13px;font-weight:600;letter-spacing:.06em;">Blackout date — PTO not allowed</div>`;
  if(ad==="admin") h+=`<div class="disp" style="background:var(--mint-100);color:var(--mint-700);padding:8px 22px;font-size:13px;font-weight:600;letter-spacing:.06em;border-bottom:1px solid var(--mint-200);">Admin day — flexible (Dr. A can schedule off)</div>`;
  if(ad==="meeting") h+=`<div class="disp" style="background:var(--coral-100);color:var(--coral-700);padding:8px 22px;font-size:13px;font-weight:600;letter-spacing:.06em;border-bottom:1px solid var(--coral-200);">Admin day + staff meeting — Dr. A must attend</div>`;
  /* quick admin-day toggle (admin only) */
  if(S.admin){
    const opt=(val,label,on,onBg,onFg)=>`<button data-act="adminday" data-date="${dd}" data-v="${val}" style="flex:1;border:none;border-radius:999px;padding:8px 6px;font-weight:700;font-size:12.5px;background:${on?onBg:"transparent"};color:${on?onFg:"#4C5868"};">${label}</button>`;
    h+=`<div style="padding:12px 22px;border-bottom:1px solid var(--grey-200);">
      <div class="disp" style="font-weight:600;letter-spacing:.12em;font-size:12px;color:var(--grey-600);margin-bottom:8px;">Mark this day</div>
      <div style="display:flex;gap:6px;background:var(--grey-100);border-radius:999px;padding:4px;">
        ${opt("","Regular",!ad,"#1B2F4C","#FFFFFF")}
        ${opt("admin","Admin day",ad==="admin","#64F4C9","#11203A")}
        ${opt("meeting","Admin + mtg",ad==="meeting","#FA624D","#FFFFFF")}
      </div>
    </div>`;
  }
  h+=`<div style="flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:10px;">`;
  if(!list.length) h+=`<div style="color:var(--grey-500);font-size:15px;padding:20px 0;">Nothing scheduled this day.</div>`;
  list.forEach(e=>{
    const c=typeColors(e.type);
    h+=`<div style="border:1px solid var(--grey-200);border-left:6px solid ${c.edge};border-radius:10px;padding:12px 14px;">
      <div style="display:flex;align-items:baseline;gap:10px;">
        <div style="flex:1;font-weight:700;font-size:16px;color:var(--navy-800);">${esc(entryLabel(e))}</div>
        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${c.edge};">${c.label}</span>
      </div>
      <div style="font-size:13.5px;color:var(--grey-500);margin-top:3px;">${esc(entrySub(e))}</div>`;
    if(e.notes) h+=`<div style="font-size:14px;color:var(--grey-600);margin-top:6px;">${esc(e.notes)}</div>`;
    if(S.admin&&!e.synced){
      h+=`<div style="display:flex;gap:8px;margin-top:10px;">
        <button data-act="edit-entry" data-id="${e.id}" class="hov-grey" style="border:1px solid var(--grey-300);background:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--navy-800);">Edit</button>
        <button data-act="del-entry" data-id="${e.id}" class="hov-coral1" style="border:1px solid var(--coral-200);background:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;color:var(--coral-700);">Delete</button>
      </div>`;
    } else if(S.admin&&e.synced&&e.type==="pto"){
      h+=`<div style="font-size:12.5px;color:var(--grey-400);margin-top:8px;">Synced from the Time-Off Request app — manage it there.</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  if(S.admin){
    h+=`<div style="padding:14px 22px;border-top:1px solid var(--grey-200);">
      <button data-act="add-for-day" data-date="${dd}" class="pill-btn hov-blue7" style="width:100%;padding:13px;font-size:15px;background:var(--blue-600);color:#fff;">+ Add entry on this day</button>
    </div>`;
  }
  h+=`</div>`;
  return h;
}

function renderEntry(){
  const f=S.form;
  const typeBtn=(t,g,l)=>{
    const on=f.type===t;
    return `<button data-act="form-type" data-v="${t}" style="flex:1;border:none;border-radius:999px;padding:9px;font-weight:700;font-size:14px;background:${on?"#1B2F4C":"transparent"};color:${on?"#FFFFFF":"#4C5868"};">${g} ${l}</button>`;
  };
  const lab=`display:flex;flex-direction:column;gap:5px;font-size:13px;font-weight:700;color:var(--grey-600);text-transform:uppercase;letter-spacing:.06em;`;
  const inp=`padding:10px;border:2px solid var(--grey-300);border-radius:10px;font-size:15px;color:var(--navy-800);`;
  let h=`<div data-act="close-entry" style="position:fixed;inset:0;background:rgba(17,32,58,.5);z-index:70;"></div>
  <div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:71;background:#fff;border-radius:16px;padding:26px;width:min(460px,94vw);max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(17,32,58,.35);">
    <div class="disp" style="font-weight:700;font-size:24px;color:var(--navy-800);margin-bottom:16px;">${f.id?"Edit entry":"Add entry"}</div>
    <div style="display:flex;gap:6px;background:var(--grey-100);border-radius:999px;padding:4px;margin-bottom:16px;">
      ${typeBtn("pto","●","PTO")}${typeBtn("event","■","Event")}${typeBtn("task","▲","Task")}
    </div>
    <div style="display:flex;flex-direction:column;gap:12px;">`;
  if(f.type==="pto"){
    h+=`<label style="${lab}">Staff member
      <select id="f-staff" style="${inp}background:#fff;"><option value="">— Select staff —</option>`;
    Object.keys(S.data.staff).filter(id=>S.data.staff[id].active).forEach(id=>{
      h+=`<option value="${id}" ${f.staffId===id?"selected":""}>${esc(S.data.staff[id].name)}</option>`;
    });
    h+=`</select></label>`;
  }
  h+=`<label style="${lab}">${f.type==="pto"?"Label (optional)":"Title"}
      <input type="text" id="f-title" value="${esc(f.title)}" placeholder="${f.type==="pto"?"e.g. Vacation, Sick day":(f.type==="task"?"e.g. Supply order due":"e.g. Staff meeting")}" style="${inp}">
    </label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <label style="${lab}">Start date<input type="date" id="f-start" value="${f.startDate}" style="${inp}font-size:14px;"></label>
      <label style="${lab}">End date<input type="date" id="f-end" value="${f.endDate}" style="${inp}font-size:14px;"></label>
    </div>`;
  if(f.type==="event"){
    h+=`<div style="display:flex;align-items:center;gap:14px;">
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--navy-800);cursor:pointer;">
        <input type="checkbox" id="f-allday" ${f.allDay?"checked":""} style="width:18px;height:18px;accent-color:#1D3EA9;"> All-day
      </label>`;
    if(!f.allDay) h+=`<input type="time" id="f-time" value="${f.time}" style="padding:8px;border:2px solid var(--grey-300);border-radius:10px;font-size:14px;color:var(--navy-800);">`;
    h+=`</div>`;
  }
  if(f.type==="task"){
    h+=`<label style="${lab}">Repeats
      <select id="f-rec" style="${inp}background:#fff;">
        <option value="" ${!f.recurrence?"selected":""}>Does not repeat</option>
        <option value="monthly" ${f.recurrence==="monthly"?"selected":""}>Monthly</option>
        <option value="quarterly" ${f.recurrence==="quarterly"?"selected":""}>Quarterly</option>
        <option value="yearly" ${f.recurrence==="yearly"?"selected":""}>Yearly</option>
      </select></label>`;
  }
  h+=`<label style="${lab}">Notes<textarea id="f-notes" rows="2" style="${inp}resize:vertical;min-height:56px;">${esc(f.notes)}</textarea></label>`;
  if(S.formError) h+=`<div style="color:var(--coral-700);font-size:13.5px;font-weight:600;">${esc(S.formError)}</div>`;
  if(S.blackoutWarn){
    h+=`<div style="background:var(--amber-100);border:1px solid #F5DFA9;border-radius:10px;padding:12px 14px;">
      <div style="font-weight:700;font-size:14px;color:var(--amber-700);">⚠ Blackout date conflict</div>
      <div style="font-size:13.5px;color:var(--grey-600);margin-top:4px;">This PTO overlaps a blackout date. Save anyway?</div>
      <button data-act="save-anyway" class="hov-amber7" style="margin-top:10px;border:none;background:var(--amber-600);border-radius:999px;padding:8px 18px;font-weight:700;font-size:13px;color:#fff;">Save anyway</button>
    </div>`;
  }
  h+=`</div><div style="display:flex;gap:10px;margin-top:20px;align-items:center;">`;
  if(f.id) h+=`<button data-act="del-from-form" data-id="${f.id}" class="hov-coral1" style="border:1px solid var(--coral-200);background:#fff;border-radius:999px;padding:11px 18px;font-weight:600;font-size:14px;color:var(--coral-700);">Delete</button>`;
  h+=`<div style="flex:1;"></div>
    <button data-act="close-entry" class="hov-grey" style="border:1px solid var(--grey-300);background:#fff;border-radius:999px;padding:11px 20px;font-weight:600;font-size:14px;color:var(--navy-800);">Cancel</button>
    <button data-act="save-entry" class="pill-btn hov-blue7" style="padding:11px 26px;font-size:14px;background:var(--blue-600);color:#fff;">Save</button>
  </div></div>`;
  return h;
}

    <div class="disp" style="font-weight:600;letter-spacing:.12em;font-size:14px;color:var(--blue-600);margin-bottom:10px;">Admin PIN</div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input type="text" inputmode="numeric" id="pin-field" placeholder="New PIN (4–6 digits)" style="flex:1;padding:10px;border:2px solid var(--grey-300);border-radius:10px;font-size:14px;color:var(--navy-800);letter-spacing:.2em;">
      <button data-act="pin-save" class="hov-navy9" style="border:none;background:var(--navy-800);border-radius:10px;padding:10px 18px;font-weight:700;font-size:14px;color:#fff;">Save</button>
    </div>
    ${S.pinSaved?`<div style="color:var(--mint-700);font-size:13.5px;font-weight:600;margin-top:8px;">PIN updated.</div>`:""}
  </div>`;
  return h;
}

/* ================= EVENTS ================= */
document.getElementById("app").addEventListener("click",(ev)=>{
  const el=ev.target.closest("[data-act]");
  if(!el) return;
  const act=el.dataset.act;
  const today=todayStr();
  switch(act){
    case "view": S.view=el.dataset.v; render(); break;
    case "prev": case "next": {
      const n=act==="prev"?-1:1;
      if(S.view==="month"){ const cd=parseD(S.cursor||today); S.cursor=fmt(new Date(cd.getFullYear(),cd.getMonth()+n,1)); }
      else S.cursor=addDays(S.cursor||today,n*7);
      render(); break;
    }
    case "today": S.cursor=today; render(); break;
    case "filter": { const k=el.dataset.f; S.filters[k]=!S.filters[k]; render(); break; }
    case "open-day":
      if(S.admin&&S.paintMode){ cycleAdminDay(el.dataset.date); break; }
      S.detailDate=el.dataset.date; render(); break;
    case "paint-toggle": S.paintMode=!S.paintMode; render(); break;
    case "close-detail": if(ev.target===el||el.tagName==="BUTTON"){ S.detailDate=null; render(); } break;
    case "open-pin": S.pinOpen=true; S.pinValue=""; S.pinError=false; render(); break;
    case "close-pin": if(ev.target===el||el.tagName==="BUTTON"){ S.pinOpen=false; S.pinValue=""; S.pinError=false; render(); } break;
    case "submit-pin": trySubmitPin(); break;
    case "lock-admin": S.admin=false; S.paintMode=false; render(); break;
    case "open-add": S.form=blankForm(S.detailDate||today); S.entryOpen=true; S.blackoutWarn=false; S.formError=""; render(); break;
    case "add-for-day": S.form=blankForm(el.dataset.date); S.entryOpen=true; S.blackoutWarn=false; S.formError=""; render(); break;
    case "close-entry": if(ev.target===el||el.tagName==="BUTTON"){ S.entryOpen=false; S.form=null; S.blackoutWarn=false; S.formError=""; render(); } break;
    case "form-type": readFormDom(); S.form.type=el.dataset.v; S.blackoutWarn=false; S.formError=""; render(); break;
    case "save-entry": saveEntry(false); break;
    case "save-anyway": saveEntry(true); break;
    case "del-from-form": deleteEntry(el.dataset.id); break;
    case "edit-entry": {
      const e=S.data.events[el.dataset.id];
      if(!e) break;
      S.form={ id:el.dataset.id, type:e.type, title:(e.type==="pto"&&e.title==="PTO")?"":e.title, staffId:e.staffId||"",
               startDate:e.startDate, endDate:e.endDate||e.startDate, allDay:!e.time, time:e.time||"09:00",
               notes:e.notes||"", recurrence:e.recurrence||"" };
      S.entryOpen=true; S.blackoutWarn=false; S.formError=""; render(); break;
    }
    case "del-entry": deleteEntry(el.dataset.id); break;
    case "adminday": setAdminDay(el.dataset.date, el.dataset.v||null); break;
    case "open-settings": S.settingsOpen=true; S.pinSaved=false; render(); break;
    case "close-settings": if(ev.target===el||el.tagName==="BUTTON"){ S.settingsOpen=false; render(); } break;
    case "sync-now": syncTimeOff(); break;
    case "staff-remove": {
      const id=el.dataset.id;
      if(!window.confirm("Remove "+S.data.staff[id].name+" from the staff list? Existing PTO entries stay on the calendar.")) break;
      fbRemove("staff/"+id); break;
    }
    case "staff-add": {
      const inp=document.getElementById("new-staff");
      const name=(inp.value||"").trim();
      if(!name) break;
      fbSet("staff/s"+Date.now(),{name,active:true});
      inp.value=""; break;
    }
    case "blackout-remove": fbRemove("settings/blackoutDates/"+el.dataset.date); break;
    case "blackout-add": {
      const inp=document.getElementById("new-blackout");
      if(!inp.value) break;
      fbSet("settings/blackoutDates/"+inp.value,true);
      inp.value=""; break;
    }
    case "pin-save": {
      const inp=document.getElementById("pin-field");
      const p=(inp.value||"").replace(/\D/g,"").slice(0,6);
      if(p.length<4) break;
      fbSet("settings/adminPin",p);
      S.pinSaved=true; render(); break;
    }
  }
});

document.getElementById("app").addEventListener("change",(ev)=>{
  const el=ev.target.closest("[data-chg]");
  if(el&&el.dataset.chg==="staff-toggle"){
    fbSet("staff/"+el.dataset.id+"/active",el.checked);
    return;
  }
  if(ev.target.id==="f-allday"){ readFormDom(); render(); }
  if(ev.target.id==="f-start"){
    readFormDom();
    if(S.form.endDate<S.form.startDate){ S.form.endDate=S.form.startDate; render(); }
  }
});

document.getElementById("app").addEventListener("keydown",(ev)=>{
  if(ev.target.id==="pin-input"){
    S.pinValue=ev.target.value;
    if(ev.key==="Enter"){ setTimeout(trySubmitPin,0); }
  }
});
document.getElementById("app").addEventListener("input",(ev)=>{
  if(ev.target.id==="pin-input"){ S.pinValue=ev.target.value; }
});

function trySubmitPin(){
  const el=document.getElementById("pin-input");
  const val=el?el.value:S.pinValue;
  const pin=(S.data&&S.data.settings&&S.data.settings.adminPin)||"2468";
  if(val===pin){ S.admin=true; S.pinOpen=false; S.pinValue=""; S.pinError=false; }
  else { S.pinValue=val; S.pinError=true; }
  render();
}

/* ================= BOOT ================= */
render();
syncTimeOff();
</script>
</body>
</html>
