const ago = d => new Date(Date.now() - d * 864e5).toISOString();
const fmt = p => p == null ? "—" : `${Number(p).toFixed(2)}`;
function stockStatus(qty, min) {
  if (qty === 0) return "out";
  if (qty < min) return "low";
  if (qty < min * 1.5) return "ok";
  return "good";
}
function ageLabel(d) {
  if (!d) return "Never";
  const days = Math.floor((Date.now() - new Date(d)) / 864e5);
  if (days === 0) return "Today";
  if (days === 1) return "Yesterday";
  return `${days}d ago`;
}
function ageColor(d) {
  if (!d) return "text-gray-300";
  const days = Math.floor((Date.now() - new Date(d)) / 864e5);
  if (days <= 2) return "text-emerald-500";
  if (days <= 7) return "text-gray-400";
  return "text-amber-500";
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}
function mdToHtml(r) {
  var LT = String.fromCharCode(60), GT = String.fromCharCode(62), AMP = String.fromCharCode(38);
  r = r.replace(/&/g, AMP + "amp;").replace(new RegExp(LT, "g"), AMP + "lt;").replace(new RegExp(GT, "g"), AMP + "gt;");
  r = r.replace(/\*\*(.+?)\*\*/g, LT + "strong style='color:#111'" + GT + "$1" + LT + "/strong" + GT);
  r = r.replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g, LT + "a href='$2' target='_blank' rel='noopener' style='color:#2563eb;text-decoration:underline'" + GT + "$1" + LT + "/a" + GT);
  r = r.replace(/^### (.+)$/gm, LT + "p style='font-weight:700;color:#111;margin-top:12px'" + GT + "$1" + LT + "/p" + GT);
  r = r.replace(/^## (.+)$/gm, LT + "p style='font-weight:700;font-size:15px;color:#111;margin-top:16px'" + GT + "$1" + LT + "/p" + GT);
  r = r.replace(/^[\-\*] (.+)$/gm, LT + "div style='padding-left:16px'" + GT + "\u2022 $1" + LT + "/div" + GT);
  r = r.replace(/\n{2,}/g, LT + "br/" + GT + LT + "br/" + GT);
  r = r.replace(/\n/g, LT + "br/" + GT);
  return r;
}

// ─── localStorage ─────────────────────────────────────────────────────────────
function loadItems() {
  try {
    const raw = localStorage.getItem('nlo-items');
    if (raw) {
      const saved = JSON.parse(raw);
      const savedIds = new Set(saved.map(i => i.id));
      // Merge in any new SEED items not yet in saved data
      const newItems = SEED.filter(i => !savedIds.has(i.id));
      const merged = newItems.length > 0 ? [...saved, ...newItems] : saved;
      // Patch sources and group from SEED onto saved items
      const seedMap = {};
      const seedGroupMap = {};
      const seedImgMap = {};
      const seedUnitMap = {};
      const seedExpMap = {};
      SEED.forEach(s => {
        if (s.sources) seedMap[s.id] = s.sources;
        if (s.group) seedGroupMap[s.id] = s.group;
        if (s.img) seedImgMap[s.id] = s.img;
        if (s.unit) seedUnitMap[s.id] = s.unit;
        if (s.exp !== undefined) seedExpMap[s.id] = s.exp;
      });
      merged.forEach(item => {
        if (seedMap[item.id]) item.sources = seedMap[item.id];
        if (seedGroupMap[item.id]) item.group = seedGroupMap[item.id];
        if (seedImgMap[item.id]) item.img = seedImgMap[item.id];
        if (seedUnitMap[item.id]) item.unit = seedUnitMap[item.id];
        if (seedExpMap[item.id] !== undefined) item.exp = seedExpMap[item.id];
      });
      return merged;
    }
  } catch (e) {}
  return SEED;
}
function saveItems(it) {
  try {
    localStorage.setItem('nlo-items', JSON.stringify(it));
  } catch (e) {}
}
function loadLog() {
  try {
    const raw = localStorage.getItem('nlo-log');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}
function saveLog(l) {
  try {
    localStorage.setItem('nlo-log', JSON.stringify(l));
  } catch (e) {}
}
function loadVendors() {
  try {
    const raw = localStorage.getItem('nlo-vendors');
    if (raw) {
      const saved = JSON.parse(raw);
      const savedIds = new Set(saved.map(v => v.id));
      const newVendors = VENDORS.filter(v => !savedIds.has(v.id));
      // Merge saved data over defaults so new fields from code are preserved
      const merged = VENDORS.map(dv => {
        const sv = saved.find(s => s.id === dv.id);
        return sv ? { ...dv, ...sv } : dv;
      });
      // Add any vendors that exist in saved but not in defaults (user-created)
      const extraVendors = saved.filter(sv => !VENDORS.find(dv => dv.id === sv.id));
      return [...merged, ...extraVendors];
    }
  } catch (e) {}
  return [...VENDORS];
}
function saveVendors(v) {
  try {
    localStorage.setItem('nlo-vendors', JSON.stringify(v));
  } catch (e) {}
}

function loadOrders() {
  try {
    const raw = localStorage.getItem('nlo-orders');
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return [];
}

function saveOrders(o) {
  try {
    localStorage.setItem('nlo-orders', JSON.stringify(o));
  } catch (e) {}
}

// ─── Vendor helpers ───────────────────────────────────────────────────────────
function vendorFromSrc(src) {
  if (!src) return null;
  if (src.includes("americanortho")) return "American Orthodontics";
  if (src.includes("sunsurgical")) return "SunSurgical";
  if (src.includes("patterson")) return "Patterson Dental";
