/* ============================================================
   INSTANCE CARD
   ============================================================ */
function InstanceCard({ inst, state, dispatch, user, admin, readOnly, highlightAssignee }) {
  const [open, setOpen] = useState(true);
  const [certifying, setCertifying] = useState(false);
  const role = state.roles.find(r => r.id === inst.roleId);
  const progress = inst.items.filter(i => i.status === 'done').length;
  const total = inst.items.length;
  const allDone = progress === total && total > 0;
  const overdue = inst.status !== 'completed' && inst.dueAt < now();
  const roleMembers = state.staff.filter(s => s.roleIds?.includes(inst.roleId));
  const certifier = inst.certifiedBy ? state.staff.find(s => s.id === inst.certifiedBy) : null;

  return (
    <div className={`card p-4 ${overdue ? 'border-red-300 bg-red-50/40' : ''} ${allDone && !inst.completedAt ? 'border-green-300' : ''}`}>
      <div className="flex items-start justify-between gap-3">
        <button onClick={() => setOpen(o => !o)} className="text-left flex-1">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="font-semibold text-slate-900">{inst.checklistName}</span>
            {inst.kind === 'event' && inst.appointmentLabel && (<span className="text-slate-500 text-sm">— {inst.appointmentLabel}</span>)}
            {inst.kind === 'recurring' && <span className="pill bg-slate-100 text-slate-600">{inst.date}</span>}
            {inst.kind === 'event'     && <span className="pill bg-indigo-100 text-indigo-800">Event</span>}
            {role && <span className="pill bg-slate-100 text-slate-600">{role.name}</span>}
            {inst.status === 'completed' && <span className="pill bg-green-100 text-green-800">Completed</span>}
            {overdue && <span className="pill bg-red-100 text-red-800">Overdue</span>}
          </div>
          <div className="text-xs text-slate-500 mt-1">
            {progress}/{total} done •{' '}
            {inst.status === 'completed'
              ? <>Certified {fmtRel(inst.certifiedAt || inst.completedAt)}{certifier ? ` by ${certifier.name}` : ''}</>
              : <>Due <span className={overdue ? 'text-red-700 font-medium' : ''}>{fmtRel(inst.dueAt)}</span></>}
          </div>
        </button>
        <div className="flex items-center gap-2">
          <div className="w-24 h-2 bg-slate-100 rounded-full overflow-hidden hidden sm:block">
            <div className="h-full bg-blue-600 transition-all" style={{ width: `${total ? (progress/total)*100 : 0}%` }} />
          </div>
          {admin && !readOnly && (
            <button title="Delete" onClick={() => confirm('Delete this checklist instance? (It stays in the audit log.)') && dispatch({ type: 'INSTANCE_DELETE', id: inst.id })}
              className="btn btn-ghost text-slate-400 hover:text-red-600">✕</button>
          )}
        </div>
      </div>

      {open && (
        <>
          <ul className="mt-3 space-y-1">
            {inst.items.map(it => {
              const assignee = state.staff.find(s => s.id === it.assignedTo);
              const mine = it.assignedTo === user.id;
              const canCheck = !readOnly && inst.status !== 'completed' && (admin || mine || !it.assignedTo);
              return (
                <li key={it.id} className={`flex items-start gap-3 py-2 px-2 rounded ${highlightAssignee === it.assignedTo ? 'bg-blue-50/60' : ''}`}>
                  <input type="checkbox" checked={it.status === 'done'} disabled={!canCheck}
                    onChange={() => dispatch({ type: 'ITEM_TOGGLE', instanceId: inst.id, itemId: it.id, actorId: user.id })}
                    className="mt-1 h-4 w-4 accent-blue-600 disabled:opacity-40" />
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm ${it.status === 'done' ? 'line-through text-slate-400' : 'text-slate-800'}`}>{it.label}</div>
                    <div className="text-xs text-slate-500 mt-0.5 flex flex-wrap items-center gap-x-2 gap-y-0.5">
                      {assignee
                        ? <span className={mine ? 'text-blue-700 font-medium' : ''}>Assigned: {assignee.name}{mine ? ' (you)' : ''}</span>
                        : <span className="text-slate-400">Unassigned — anyone in {role?.name || 'role'}</span>}
                      {it.status === 'done' && it.completedBy && (<span>• Done by {state.staff.find(s => s.id === it.completedBy)?.name || '?'} {fmtRel(it.completedAt)}</span>)}
                    </div>
                  </div>
                  {admin && !readOnly && (
                    <select value={it.assignedTo || ''} title="Reassign within role"
                      onChange={e => dispatch({ type: 'ITEM_ASSIGN', instanceId: inst.id, itemId: it.id, assigneeId: e.target.value || null, actorId: user.id })}
                      className="input py-1 text-xs w-auto max-w-[180px]">
                      <option value="">Unassigned</option>
                      {roleMembers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                  )}
                </li>
              );
            })}
          </ul>

          {/* Certification footer */}
          {inst.status !== 'completed' && allDone && !readOnly && (
            <div className="mt-3 p-3 bg-green-50 border border-green-200 rounded-lg flex flex-wrap items-center justify-between gap-2">
              <div className="text-sm text-green-900">
                <strong>All items checked.</strong> Certify completion to close this checklist.
              </div>
              <button className="btn btn-success" onClick={() => setCertifying(true)}>✓ Certify &amp; complete</button>
            </div>
          )}
          {inst.status === 'completed' && (
            <div className="mt-3 p-3 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700">
              <div><strong>Certified by {certifier?.name || '?'}</strong> at {fmtTime(inst.certifiedAt || inst.completedAt)}.</div>
              {inst.certificationNote && <div className="text-slate-600 mt-1 italic">"{inst.certificationNote}"</div>}
            </div>
          )}
        </>
      )}

      {certifying && (
        <CertifyDialog
          inst={inst} user={user}
          onClose={() => setCertifying(false)}
          onConfirm={(note) => {
            dispatch({ type: 'CHECKLIST_CERTIFY', instanceId: inst.id, actorId: user.id, note });
            setCertifying(false);
          }}
        />
      )}
    </div>
  );
}

function CertifyDialog({ inst, user, onClose, onConfirm }) {
  const [note, setNote] = useState('');
  return (
    <Modal onClose={onClose} title="Certify checklist completion">
      <div className="space-y-4">
        <div className="card p-3 bg-slate-50 border-slate-200 text-sm">
          <div className="font-semibold text-slate-900">{inst.checklistName}</div>
          {inst.kind === 'event' && inst.appointmentLabel && (<div className="text-slate-600">{inst.appointmentLabel}</div>)}
          <div className="text-xs text-slate-500 mt-1">{inst.items.length} items, all checked.</div>
        </div>
        <div className="p-3 border border-amber-200 bg-amber-50 rounded-lg text-sm text-amber-900">
          <strong>By certifying, I, {user.name}, attest that:</strong>
          <ul className="list-disc list-inside mt-1 text-amber-800">
            <li>Every item on this checklist has been personally completed or verified.</li>
            <li>The workspace, equipment, or patient is ready for the next step or inspection.</li>
            <li>This certification will be permanently recorded with my name and the time.</li>
          </ul>
        </div>
        <Field label="Optional note" hint="Anything worth capturing (e.g. 'fridge 4 temp alarm reset').">
          <textarea className="input" rows="2" value={note} onChange={e => setNote(e.target.value)} placeholder="Notes for the audit log…" />
        </Field>
      </div>
      <div className="flex justify-end gap-2 mt-6">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-success" onClick={() => onConfirm(note.trim())}>I certify — complete checklist</button>
      </div>
    </Modal>
  );
}

/* ============================================================
   ADMIN: CHECKLIST DEFINITIONS
   ============================================================ */
function ChecklistDefsTab({ kind, state, dispatch, user, scope }) {
  const [editing, setEditing] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const scoped = state.checklists.filter(c => c.kind === kind && (!scope || scope.visibleRoleIds.has(c.roleId)));
  const activeList   = scoped.filter(c => !c.archived);
  const archivedList = scoped.filter(c =>  c.archived);
  const list = showArchived ? archivedList : activeList;
  const title = kind === 'recurring' ? 'Recurring checklists' : 'Event-triggered checklists';
  const blurb = kind === 'recurring'
    ? 'Appear automatically each scheduled day. Due time defines when overdue alerts fire.'
    : 'Started on demand when something happens (e.g. a new patient arrives). Overdue based on SLA minutes.';

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div>
          <h2 className="text-lg font-semibold text-slate-900">{title}</h2>
          <p className="text-sm text-slate-500">{blurb}</p>
        </div>
        <div className="flex items-center gap-2 flex-wrap">
          {archivedList.length > 0 && (
            <button
              className={`btn text-xs ${showArchived ? 'btn-primary' : 'btn-secondary'}`}
              onClick={() => setShowArchived(v => !v)}>
              {showArchived ? `← Back to active (${activeList.length})` : `📁 Archived (${archivedList.length})`}
            </button>
          )}
          <button className="btn btn-primary" onClick={() => setEditing('new')}>+ New {kind === 'recurring' ? 'recurring' : 'event'} checklist</button>
        </div>
      </div>
      {showArchived && (
        <div className="card p-3 bg-slate-50 border-slate-200 text-sm text-slate-600">
          Archived checklists won't generate new instances or appear on staff dashboards. Unarchive to restore.
        </div>
      )}
      <div className="grid gap-3 sm:grid-cols-2">
        {list.map(c => {
          const role = state.roles.find(r => r.id === c.roleId);
          const isSeed = (DEFAULT_STATE.checklists || []).some(s => s.id === c.id);
          return (
            <div key={c.id} className={`card p-4 ${c.archived ? 'opacity-75 bg-slate-50' : ''}`}>
              <div className="flex items-start justify-between gap-2">
                <div>
                  <div className="font-semibold text-slate-900 flex items-center gap-2 flex-wrap">
                    {c.name}
                    {c.archived && <span className="pill bg-amber-100 text-amber-800">Archived</span>}
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5">
                    {role?.name || '—'} · {c.items.length} items
                    {c.kind === 'recurring' && <> · {scheduleLabel(c.schedule)}</>}
                    {c.kind === 'event'     && <> · SLA {c.slaMinutes}m</>}
                  </div>
                  <div className="text-xs text-slate-500 mt-0.5">
                    👥 {(c.assignedStaffIds && c.assignedStaffIds.length > 0)
                      ? c.assignedStaffIds.slice(0, 4).map(id => state.staff.find(s => s.id === id)?.name?.split(' ')[0] || '?').join(', ')
                        + (c.assignedStaffIds.length > 4 ? `, +${c.assignedStaffIds.length - 4}` : '')
                      : <em>everyone currently in the role</em>}
                  </div>
                  {(c.effectiveFrom || c.effectiveUntil) && (
                    <div className="text-xs text-slate-500 mt-0.5">
                      📅 {c.effectiveFrom ? new Date(c.effectiveFrom).toLocaleDateString() : 'now'} → {c.effectiveUntil ? new Date(c.effectiveUntil).toLocaleDateString() : 'ongoing'}
                    </div>
                  )}
                </div>
                <div className="flex gap-1 flex-wrap justify-end">
                  <button className="btn btn-ghost text-xs" onClick={() => setEditing(c)}>Edit</button>
                  {c.archived ? (
                    <button
                      className="btn btn-ghost text-xs text-blue-600"
                      title="Restore this checklist"
                      onClick={() => dispatch({ type: 'CHECKLIST_UNARCHIVE', id: c.id })}>
                      ♻ Unarchive
                    </button>
                  ) : (
                    <button
                      className="btn btn-ghost text-xs text-amber-700"
                      title="Hide from daily use. Keeps all past instances and audit history. Reversible."
                      onClick={() => dispatch({ type: 'CHECKLIST_ARCHIVE', id: c.id })}>
                      📁 Archive
                    </button>
                  )}
                  <button
                    className="btn btn-ghost text-xs text-red-600"
                    title={isSeed
                      ? 'Permanently delete this built-in checklist. It won\'t come back unless you restore it from Settings.'
                      : 'Permanently delete. Cannot be undone.'}
                    onClick={() => {
                      const warn = isSeed
                        ? `Permanently delete "${c.name}"?\n\nThis is a built-in checklist. It will be removed and won't come back on its own. (You can use Archive instead to hide it without deleting.)\n\nOK to delete?`
                        : `Permanently delete "${c.name}"?\n\nThis cannot be undone. (Use Archive to hide it without deleting.)`;
                      if (confirm(warn)) dispatch({ type: 'CHECKLIST_DELETE', id: c.id });
                    }}>
                    ✕ Delete
                  </button>
                </div>
              </div>
              <ul className="mt-2 text-sm text-slate-600 space-y-0.5">
                {c.items.map(i => {
                  const owner = i.defaultAssigneeId ? state.staff.find(s => s.id === i.defaultAssigneeId)?.name : null;
                  return <li key={i.id}>• {i.label}{owner && <span className="text-slate-400"> — {owner}</span>}</li>;
                })}
              </ul>
            </div>
          );
        })}
        {list.length === 0 && (
          <div className="card p-6 text-center text-slate-400 text-sm col-span-2">
            {showArchived ? 'No archived checklists.' : `No ${kind} checklists yet.`}
          </div>
        )}
      </div>

      {editing && (
        <ChecklistEditor kind={kind} state={state} checklist={editing === 'new' ? null : editing}
          onClose={() => setEditing(null)}
          onSave={(cl) => { dispatch({ type: 'CHECKLIST_SAVE', checklist: cl }); setEditing(null); }} />
      )}
    </div>
  );
}

function ChecklistEditor({ kind, state, checklist, onClose, onSave }) {
  const [name, setName] = useState(checklist?.name || '');
  const [roleId, setRoleId] = useState(checklist?.roleId || state.roles[0]?.id || '');
  const [freq, setFreq] = useState(checklist?.schedule?.freq || 'weekdays');
  const [weekday, setWeekday] = useState(checklist?.schedule?.weekday ?? 1);
  const [dayOfMonth, setDayOfMonth] = useState(checklist?.schedule?.dayOfMonth ?? 1);
  const [startMonth, setStartMonth] = useState(checklist?.schedule?.startMonth ?? 0);
  const [dueTime, setDueTime] = useState(checklist?.schedule?.dueTime || '17:00');
  const [slaMinutes, setSlaMinutes] = useState(checklist?.slaMinutes || (kind === 'event' ? 45 : 60));
  const [items, setItems] = useState(checklist?.items?.length ? checklist.items : [{ id: uid(), label: '', defaultAssigneeId: null }]);

  // Staff assignment — start with either the existing list OR everyone in the picked role
  const initialAssigned = checklist?.assignedStaffIds?.length
    ? checklist.assignedStaffIds
    : state.staff.filter(s => s.roleIds?.includes(checklist?.roleId || roleId)).map(s => s.id);
  const [assignedStaffIds, setAssignedStaffIds] = useState(initialAssigned);

  // Effective date range (ISO date strings for the <input type="date">)
  const dateToInput = (ts) => ts ? new Date(ts).toISOString().slice(0, 10) : '';
  const [effectiveFromDate,  setEffectiveFromDate]  = useState(dateToInput(checklist?.effectiveFrom));
  const [effectiveUntilDate, setEffectiveUntilDate] = useState(dateToInput(checklist?.effectiveUntil));

  const toggleAssignee = (id) => setAssignedStaffIds(ids =>
    ids.includes(id) ? ids.filter(x => x !== id) : [...ids, id]
  );
  const selectAllInRole = (rid) => {
    const memberIds = state.staff.filter(s => s.roleIds?.includes(rid)).map(s => s.id);
    const allSelected = memberIds.every(id => assignedStaffIds.includes(id));
    setAssignedStaffIds(ids => allSelected
      ? ids.filter(id => !memberIds.includes(id))
      : Array.from(new Set([...ids, ...memberIds]))
    );
  };

  // Item default-owner dropdown lists only the people actually assigned
  const assignedStaff = state.staff.filter(s => assignedStaffIds.includes(s.id));

  const update = (idx, patch) => setItems(items.map((it, i) => i === idx ? { ...it, ...patch } : it));
  const addItem = () => setItems([...items, { id: uid(), label: '', defaultAssigneeId: null }]);
  const moveItem = (idx, dir) => {
    const newIdx = idx + dir; if (newIdx < 0 || newIdx >= items.length) return;
    const next = [...items]; [next[idx], next[newIdx]] = [next[newIdx], next[idx]]; setItems(next);
  };

  return (
    <Modal onClose={onClose} title={checklist ? `Edit ${kind} checklist` : `New ${kind} checklist`} wide>
      <div className="space-y-4">
        <div className="grid sm:grid-cols-2 gap-4">
          <Field label="Name">
            <input className="input" autoFocus value={name} onChange={e => setName(e.target.value)} placeholder={kind === 'recurring' ? 'e.g. End of Day — Orthodontic Assistants' : 'e.g. New Patient Intake'} />
          </Field>
          <Field label="Category (role)" hint="For grouping in the dashboard.">
            <select className="input" value={roleId} onChange={e => setRoleId(e.target.value)}>
              {state.roles.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
            </select>
          </Field>
        </div>

        <Field label={`Assigned to (${assignedStaffIds.length} selected)`} hint="Check the people who should see and do this checklist. Only these people will see it on their dashboard.">
          <div className="border border-slate-200 rounded-lg bg-slate-50 p-3 max-h-60 overflow-auto space-y-3">
            {state.roles.map(role => {
              const members = state.staff.filter(s => s.roleIds?.includes(role.id));
              if (members.length === 0) return null;
              const memberIds = members.map(m => m.id);
              const allSelected = memberIds.every(id => assignedStaffIds.includes(id));
              return (
                <div key={role.id}>
                  <div className="flex items-center justify-between mb-1">
                    <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide">{role.name}</div>
                    <button type="button" className="text-blue-600 text-xs hover:underline" onClick={() => selectAllInRole(role.id)}>
                      {allSelected ? 'Deselect all' : 'Select all'}
                    </button>
                  </div>
                  <div className="grid sm:grid-cols-2 gap-1 ml-1">
                    {members.map(s => (
                      <label key={s.id} className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer hover:bg-white rounded px-1 py-0.5">
                        <input type="checkbox" className="accent-blue-600"
                          checked={assignedStaffIds.includes(s.id)} onChange={() => toggleAssignee(s.id)} />
                        {s.name}
                      </label>
                    ))}
                  </div>
                </div>
              );
            })}
            {state.staff.filter(s => !s.roleIds?.length).length > 0 && (
              <div>
                <div className="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1">No role</div>
                <div className="grid sm:grid-cols-2 gap-1 ml-1">
                  {state.staff.filter(s => !s.roleIds?.length).map(s => (
                    <label key={s.id} className="flex items-center gap-2 text-sm text-slate-700 cursor-pointer hover:bg-white rounded px-1 py-0.5">
                      <input type="checkbox" className="accent-blue-600"
                        checked={assignedStaffIds.includes(s.id)} onChange={() => toggleAssignee(s.id)} />
                      {s.name}
                    </label>
                  ))}
                </div>
              </div>
            )}
            {assignedStaffIds.length === 0 && (
              <div className="text-xs text-amber-700 italic">Nobody selected yet — nobody will see this checklist.</div>
            )}
          </div>
        </Field>

        {kind === 'recurring' && (
          <div className="grid sm:grid-cols-2 gap-4">
            <Field label="Start date" hint="Leave blank to start immediately.">
              <input type="date" className="input" value={effectiveFromDate} onChange={e => setEffectiveFromDate(e.target.value)} />
            </Field>
            <Field label="End date" hint="Leave blank for never-ending.">
              <input type="date" className="input" value={effectiveUntilDate} onChange={e => setEffectiveUntilDate(e.target.value)} />
            </Field>
          </div>
        )}

        {kind === 'recurring' ? (
          <div className="grid sm:grid-cols-3 gap-4">
            <Field label="Frequency">
              <select className="input" value={freq} onChange={e => setFreq(e.target.value)}>
                <option value="daily">Every day</option>
                <option value="weekdays">Weekdays (Mon–Thu)</option>
                <option value="weekends">Weekends</option>
                <option value="weekly">Weekly (one day)</option>
                <option value="monthly">Monthly</option>
                <option value="quarterly">Quarterly (every 3 months)</option>
              </select>
            </Field>
            {freq === 'weekly' && (
              <Field label="Day of week">
                <select className="input" value={weekday} onChange={e => setWeekday(parseInt(e.target.value))}>
                  {/* NLO work week is Mon-Thu only. Value must match Date.getDay(): 1=Mon … 4=Thu. */}
                  {[['Mon',1],['Tue',2],['Wed',3],['Thu',4]].map(([d, i]) => <option key={i} value={i}>{d}</option>)}
                </select>
              </Field>
            )}
            {freq === 'monthly' && (
              <Field label="Day of month" hint="If the month has fewer days (e.g. 30/31), it'll skip that month.">
                <select className="input" value={dayOfMonth} onChange={e => setDayOfMonth(parseInt(e.target.value))}>
                  {Array.from({length: 31}, (_, i) => i+1).map(n => <option key={n} value={n}>{n}</option>)}
                </select>
              </Field>
            )}
            {freq === 'quarterly' && (
              <>
                <Field label="Starting month" hint="Fires every 3 months from this anchor.">
                  <select className="input" value={startMonth} onChange={e => setStartMonth(parseInt(e.target.value))}>
                    <option value={0}>Jan · Apr · Jul · Oct</option>
                    <option value={1}>Feb · May · Aug · Nov</option>
                    <option value={2}>Mar · Jun · Sep · Dec</option>
                  </select>
                </Field>
                <Field label="Day of month" hint="If the month has fewer days, it'll skip that quarter.">
                  <select className="input" value={dayOfMonth} onChange={e => setDayOfMonth(parseInt(e.target.value))}>
                    {Array.from({length: 31}, (_, i) => i+1).map(n => <option key={n} value={n}>{n}</option>)}
                  </select>
                </Field>
              </>
            )}
            <Field label="Due by (time of day)" hint="Overdue alerts fire after this.">
              <input type="time" className="input" value={dueTime} onChange={e => setDueTime(e.target.value)} />
            </Field>
          </div>
        ) : (
          <Field label="SLA (minutes)" hint="Due this many minutes after the checklist is started.">
            <input type="number" className="input w-32" min="1" value={slaMinutes} onChange={e => setSlaMinutes(parseInt(e.target.value) || 45)} />
          </Field>
        )}

        <div>
          <div className="text-sm font-medium text-slate-700 mb-2">Items</div>
          <div className="space-y-2">
            {items.map((it, idx) => (
              <div key={it.id} className="space-y-1 pb-2 border-b border-slate-100 last:border-b-0">
                <div className="flex items-center gap-2">
                  <input className="input flex-1" value={it.label} onChange={e => update(idx, { label: e.target.value })} placeholder={`Item ${idx + 1}`} />
                  <select className="input w-44 text-sm" title="Default owner (within assigned staff)"
                    value={it.defaultAssigneeId || ''} onChange={e => update(idx, { defaultAssigneeId: e.target.value || null })}>
                    <option value="">— Anyone assigned —</option>
                    {assignedStaff.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                  </select>
                  <div className="flex">
                    <button type="button" className="btn btn-ghost text-slate-400" title="Move up"   onClick={() => moveItem(idx, -1)}>↑</button>
                    <button type="button" className="btn btn-ghost text-slate-400" title="Move down" onClick={() => moveItem(idx, 1)}>↓</button>
                    <button type="button" className="btn btn-ghost text-red-600"   title="Remove"    onClick={() => setItems(items.filter((_, i) => i !== idx))}>✕</button>
                  </div>
                </div>
                {kind === 'recurring' && (
                  <div className="flex items-center gap-1 flex-wrap text-xs pl-1">
                    <span className="text-slate-500 mr-1">Include on:</span>
                    {/* NLO work week is Mon-Thu only. Indices must stay aligned with Date.getDay(): 1=Mon … 4=Thu. */}
                    {[['Mon',1],['Tue',2],['Wed',3],['Thu',4]].map(([d, di]) => {
                      const included = !(it.skipDays || []).includes(di);
                      return (
                        <button key={di} type="button"
                          onClick={() => {
                            const cur = it.skipDays || [];
                            update(idx, { skipDays: included ? [...cur, di] : cur.filter(x => x !== di) });
                          }}
                          className={`px-2 py-0.5 rounded font-medium transition ${included ? 'bg-blue-100 text-blue-800 hover:bg-blue-200' : 'bg-slate-100 text-slate-400 line-through'}`}>
                          {d}
                        </button>
                      );
                    })}
                    {(it.skipDays || []).length > 0 && (
                      <button type="button" className="text-xs text-slate-400 hover:text-slate-600 underline ml-2"
                        onClick={() => update(idx, { skipDays: [] })}>reset</button>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
          <button onClick={addItem} className="btn btn-secondary mt-2 text-sm">+ Add item</button>
          {assignedStaff.length === 0 && (
            <div className="mt-2 text-xs text-amber-700">Nobody assigned yet — use the checkboxes above to pick who does this.</div>
          )}
        </div>
      </div>
      <div className="flex justify-end gap-2 mt-6">
        <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
        <button className="btn btn-primary"
          disabled={!name.trim() || !roleId || !items.some(i => i.label.trim())}
          onClick={() => {
            const base = {
              id: checklist?.id || uid(),
              kind,
              name: name.trim(),
              roleId,
              assignedStaffIds,
              slaMinutes,
              items: items.filter(i => i.label.trim()),
              effectiveFrom:  effectiveFromDate  ? new Date(effectiveFromDate  + 'T00:00:00').getTime() : null,
              effectiveUntil: effectiveUntilDate ? new Date(effectiveUntilDate + 'T23:59:59').getTime() : null,
            };
            if (kind === 'recurring') {
              base.schedule = { freq, dueTime };
              if (freq === 'weekly')    base.schedule.weekday    = weekday;
              if (freq === 'monthly')   base.schedule.dayOfMonth = dayOfMonth;
              if (freq === 'quarterly') {
                base.schedule.startMonth = startMonth;
                base.schedule.dayOfMonth = dayOfMonth;
              }
            }
            onSave(base);
          }}>Save checklist</button>
      </div>
    </Modal>
  );
}

/* ============================================================
   ADMIN: SETTINGS (sync configuration — owner only)
   ============================================================ */
function SettingsTab({ state, dispatch }) {
  const currentUrl = state.settings?.timeOffSyncUrl || '';
  const [url, setUrl] = useState(currentUrl);
  const [busy, setBusy] = useState(false);
  const lastSyncAt = state.settings?.lastSyncAt;
  const lastError  = state.settings?.lastSyncError;
  const holidays   = state.settings?.holidays || [];

  // Keep the input field in sync with the persisted URL (covers refreshes,
  // cross-tab updates, and syncs that touch settings).
  useEffect(() => { setUrl(currentUrl); }, [currentUrl]);

  const save = () => dispatch({ type: 'SETTINGS_UPDATE', patch: { timeOffSyncUrl: url.trim() } });
  const disconnect = () => {
    if (!confirm('Disconnect sync? Time-off entries already synced stay in the app but will no longer refresh.')) return;
    setUrl('');
    dispatch({ type: 'SETTINGS_UPDATE', patch: { timeOffSyncUrl: '', lastSyncError: null } });
  };
  const doSync = async () => {
    setBusy(true);
    const target = url.trim() || currentUrl;
    if (target && target !== currentUrl) {
      dispatch({ type: 'SETTINGS_UPDATE', patch: { timeOffSyncUrl: target } });
    }
    await syncTimeOff(target, dispatch);
    setBusy(false);
  };

  // Count synced entries
  const syncedEntries = state.staff.reduce((n, s) => n + (s.timeOff || []).filter(t => t.synced).length, 0);

  return (
    <div className="space-y-4">
      <h2 className="text-lg font-semibold text-slate-900">Settings</h2>
      <div className="card p-4 space-y-3">
        <div className="flex items-center gap-2">
          <div className="text-xl">🔄</div>
          <div className="font-semibold text-slate-900">Time Off sync — Benefit Tracker (Google Sheet)</div>
        </div>
        <p className="text-sm text-slate-600">
          Pulls <strong>approved</strong> time-off requests and <strong>holidays</strong> from the Apps Script web app.
          When configured, time off is read-only in this app — manage it in the Benefit Tracker.
        </p>
        <Field label="Apps Script web app URL">
          <input className="input" type="url" value={url} onChange={e => setUrl(e.target.value)}
            placeholder="https://script.google.com/macros/s/.../exec" />
        </Field>
        <div className="flex gap-2 flex-wrap">
          <button className="btn btn-primary" disabled={!url.trim() || url.trim() === currentUrl} onClick={save}>Save URL</button>
          <button className="btn btn-secondary" disabled={busy || !(url.trim() || currentUrl)} onClick={doSync}>
            {busy ? 'Syncing…' : 'Sync now'}
          </button>
          {currentUrl && (
            <button className="btn btn-ghost text-red-600" onClick={disconnect}>Disconnect</button>
          )}
        </div>
        {/* Explicit "what's actually saved" indicator so the user can see at a glance
            that the URL was persisted — removes ambiguity when the input appears empty. */}
        <div className="text-xs">
          {currentUrl ? (
            <div className="text-green-800 bg-green-50 border border-green-200 rounded px-2 py-1">
              <strong>Connected.</strong> Saved URL: <code className="break-all text-slate-700">{currentUrl}</code>
            </div>
          ) : (
            <div className="text-slate-500 bg-slate-50 border border-slate-200 rounded px-2 py-1">
              <strong>Not connected.</strong> Paste the web app URL above and click <strong>Save URL</strong>.
            </div>
          )}
        </div>
        <div className="text-xs text-slate-500 space-y-0.5">
          {lastError && <div className="text-red-700"><strong>Last sync error:</strong> {lastError}</div>}
          {lastSyncAt && !lastError && <div>Last synced {new Date(lastSyncAt).toLocaleString()} · {syncedEntries} time-off entr{syncedEntries === 1 ? 'y' : 'ies'} · {holidays.length} holiday{holidays.length === 1 ? '' : 's'}</div>}
          {!lastSyncAt && !lastError && currentUrl && <div>URL is saved. Click <strong>Sync now</strong> to pull the latest data.</div>}
          {!lastSyncAt && !lastError && !currentUrl && <div>Not synced yet. Paste the web app URL and click Save URL.</div>}
        </div>
      </div>

      {holidays.length > 0 && (
        <div className="card p-4">
          <div className="font-semibold text-slate-900 mb-2">Office closed on these days (no checklists generated)</div>
          <ul className="grid sm:grid-cols-2 gap-1 text-sm text-slate-700">
            {holidays.slice().sort((a, b) => a.date.localeCompare(b.date)).map(h => (
              <li key={h.date}>📅 <strong>{h.date}</strong> — {h.name}</li>
            ))}
          </ul>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   ADMIN: AUDIT LOG
   ============================================================ */
function AuditTab({ state, scope }) {
  const [filter, setFilter] = useState('');
  const [expanded, setExpanded] = useState(() => new Set());
  const [lightbox, setLightbox] = useState(null);

  // Instance IDs visible in this admin's scope
  const visibleInstanceIds = useMemo(() => {
    if (!scope) return null;
    const s = new Set();
    state.instances.forEach(i => { if (scope.canSeeInstance(i)) s.add(i.id); });
    return s;
  }, [state.instances, scope]);

  // Group entries by instanceId. The "primary" row is the most meaningful event
  // for that checklist (certified > overdue > created > latest).
  const groups = useMemo(() => {
    const byInst = {};
    const standalone = [];
    state.auditLog.forEach(e => {
      if (e.instanceId) (byInst[e.instanceId] ||= []).push(e);
      else standalone.push(e);
    });
    const instGroups = Object.entries(byInst)
      .filter(([instanceId]) => !visibleInstanceIds || visibleInstanceIds.has(instanceId))
      .map(([instanceId, entries]) => {
        const sorted = [...entries].sort((a, b) => b.at - a.at);
        const cert    = sorted.find(e => e.action === 'checklist_certified');
        const overdue = sorted.find(e => e.action === 'overdue_alert');
        const created = sorted.find(e => e.action === 'instance_created');
        const primary = cert || overdue || created || sorted[0];
        return { id: 'inst-' + instanceId, type: 'group', instanceId, primary, entries: sorted, sortAt: sorted[0].at };
      });
    // Only owner sees standalone entries (which aren't tied to a specific checklist)
    const soloGroups = (!scope || scope.isOwner)
      ? standalone.map(e => ({ id: 'solo-' + e.id, type: 'single', primary: e, entries: [e], sortAt: e.at }))
      : [];
    return [...instGroups, ...soloGroups].sort((a, b) => b.sortAt - a.sortAt);
  }, [state.auditLog, visibleInstanceIds, scope]);

  const filtered = groups.filter(g => {
    if (!filter) return true;
    const hay = g.entries.map(e => `${e.action} ${e.label || ''} ${e.actorId}`).join(' ').toLowerCase();
    return hay.includes(filter.toLowerCase());
  });

  const toggle = (id) => {
    setExpanded(prev => {
      const next = new Set(prev);
      next.has(id) ? next.delete(id) : next.add(id);
      return next;
    });
  };

  const pillFor = (action) =>
    action === 'checklist_certified' ? 'bg-green-100 text-green-800' :
    action === 'inspection_pass'     ? 'bg-green-100 text-green-800' :
    action === 'overdue_alert'       ? 'bg-red-100 text-red-800' :
    action === 'inspection_fail'     ? 'bg-red-100 text-red-800' :
    action === 'instance_created'    ? 'bg-blue-100 text-blue-800' :
    'bg-slate-100 text-slate-700';

  const actorName = (actorId) =>
    actorId === 'system' ? 'System' : state.staff.find(s => s.id === actorId)?.name || actorId;

  const renderPhotos = (photos) => (photos && photos.length > 0) ? (
    <div className="flex gap-1 mt-1 flex-wrap">
      {photos.map((src, i) => (
        <img key={i} src={src} alt={`inspection ${i+1}`}
          className="w-12 h-12 object-cover rounded border border-slate-200 cursor-zoom-in hover:border-blue-400"
          onClick={(e) => { e.stopPropagation(); setLightbox(src); }} />
      ))}
    </div>
  ) : null;

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between gap-2">
        <h2 className="text-lg font-semibold text-slate-900">Audit log</h2>
        <input className="input w-64" placeholder="Filter…" value={filter} onChange={e => setFilter(e.target.value)} />
      </div>
      <div className="card overflow-hidden">
        <table className="w-full text-sm">
          <thead className="bg-slate-50 text-slate-600 text-xs uppercase">
            <tr>
              <th className="text-left px-3 py-2 w-8"></th>
              <th className="text-left px-3 py-2">When</th>
              <th className="text-left px-3 py-2">Action</th>
              <th className="text-left px-3 py-2">Detail</th>
              <th className="text-left px-3 py-2">Actor</th>
            </tr>
          </thead>
          <tbody className="divide-y divide-slate-100">
            {filtered.slice(0, 300).map(g => {
              const canExpand = g.type === 'group' && g.entries.length > 1;
              const isOpen = expanded.has(g.id);
              const detailEntries = isOpen ? [...g.entries].sort((a, b) => a.at - b.at) : [];
              return (
                <React.Fragment key={g.id}>
                  <tr className={canExpand ? 'cursor-pointer hover:bg-slate-50' : ''} onClick={() => canExpand && toggle(g.id)}>
                    <td className="px-3 py-2 text-slate-400">{canExpand ? (isOpen ? '▾' : '▸') : ''}</td>
                    <td className="px-3 py-2 text-slate-500 whitespace-nowrap">{fmtTime(g.primary.at)}</td>
                    <td className="px-3 py-2"><span className={`pill ${pillFor(g.primary.action)}`}>{g.primary.action}</span></td>
                    <td className="px-3 py-2 text-slate-700">
                      {g.primary.label || ''}
                      {canExpand && <span className="text-slate-400 ml-2 text-xs">({g.entries.length} events)</span>}
                      {renderPhotos(g.primary.photos)}
                    </td>
                    <td className="px-3 py-2 text-slate-700">{actorName(g.primary.actorId)}</td>
                  </tr>
                  {isOpen && detailEntries.map(e => (
                    <tr key={e.id} className="bg-slate-50/60">
                      <td className="px-3 py-1.5"></td>
                      <td className="px-3 py-1.5 text-slate-500 whitespace-nowrap">
                        <span className="text-slate-300 mr-1">└─</span>{fmtTime(e.at)}
                      </td>
                      <td className="px-3 py-1.5"><span className={`pill ${pillFor(e.action)}`}>{e.action}</span></td>
                      <td className="px-3 py-1.5 text-slate-700">
                        {e.label || ''}
                        {renderPhotos(e.photos)}
                      </td>
                      <td className="px-3 py-1.5 text-slate-700">{actorName(e.actorId)}</td>
                    </tr>
                  ))}
                </React.Fragment>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan="5" className="px-3 py-6 text-center text-slate-400">No entries.</td></tr>}
          </tbody>
        </table>
      </div>
      <div className="text-xs text-slate-500">
        Showing {Math.min(filtered.length, 300)} of {filtered.length} checklist{filtered.length === 1 ? '' : 's'}.
        Click a row with an arrow to see every item-level event. Click a photo to enlarge. The audit log is permanent.
      </div>

      {lightbox && (
        <div className="fixed inset-0 z-50 bg-black/85 flex items-center justify-center p-4 cursor-zoom-out"
          onClick={() => setLightbox(null)}>
          <img src={lightbox} className="max-w-full max-h-full object-contain rounded shadow-2xl" alt="inspection full size" />
          <button className="absolute top-4 right-4 text-white/80 hover:text-white text-3xl leading-none"
            onClick={(e) => { e.stopPropagation(); setLightbox(null); }}
            aria-label="Close">✕</button>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   SEED DEMO HISTORY
   Generates ~15 days of past instances + a couple of inspections
   so the compliance card, audit log, and banners have real data
   on first use.
   ============================================================ */
function seedDemoHistory(state) {
  const newInstances = [];
  const newAudit = [];
  const ownerId = state.staff.find(s => s.isOwner)?.id || state.staff[0]?.id;

  state.checklists.forEach(cl => {
    if (cl.kind !== 'recurring') return;
    const assignees = (cl.assignedStaffIds && cl.assignedStaffIds.length > 0)
      ? cl.assignedStaffIds
      : state.staff.filter(s => s.roleIds?.includes(cl.roleId)).map(s => s.id);
    if (assignees.length === 0) return;

    for (let i = 15; i >= 1; i--) {
      const d = new Date(); d.setDate(d.getDate() - i); d.setHours(0, 0, 0, 0);
      const dow = d.getDay();
      const dom = d.getDate();
      const sched = cl.schedule || {};
      if (sched.freq === 'weekdays' && (dow === 0 || dow === 5 || dow === 6)) continue; // Skip Fri/Sat/Sun — NLO is Mon-Thu
      if (sched.freq === 'weekends' && !(dow === 0 || dow === 6)) continue;
      if (sched.freq === 'weekly'   && dow !== (sched.weekday ?? 1)) continue;
      if (sched.freq === 'monthly'  && dom !== (sched.dayOfMonth ?? 1)) continue;
      if (sched.freq === 'quarterly') {
        const sm = (sched.startMonth ?? 0) % 3;
        const m  = d.getMonth();
        if (((m - sm) % 3 + 3) % 3 !== 0) continue;
        if (dom !== (sched.dayOfMonth ?? 1)) continue;
      }

      const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const [hh, mm] = (sched.dueTime || '17:00').split(':').map(Number);
      const dueAt = new Date(d); dueAt.setHours(hh, mm, 0, 0);
      const dueMs = dueAt.getTime();

      const r = Math.random();
      let status, completedAt = null, certifiedAt = null, certifiedBy = null;
      if (r < 0.82) {                             // ~82% on time
        status = 'completed';
        certifiedAt = dueMs - Math.floor(Math.random() * 45) * 60000;
        completedAt = certifiedAt;
        certifiedBy = assignees[Math.floor(Math.random() * assignees.length)];
      } else if (r < 0.93) {                      // ~11% late
        status = 'completed';
        certifiedAt = dueMs + Math.floor(Math.random() * 90) * 60000;
        completedAt = certifiedAt;
        certifiedBy = assignees[Math.floor(Math.random() * assignees.length)];
      } else {                                    // ~7% missed
        status = 'open';
      }

      const items = cl.items.map(it => {
        const completer = assignees[Math.floor(Math.random() * assignees.length)];
        return {
          id: uid(),
          label: it.label,
          assignedTo: it.defaultAssigneeId || null,
          status: status === 'completed' ? 'done' : 'pending',
          completedBy: status === 'completed' ? completer : null,
          completedAt: status === 'completed' ? (completedAt - Math.floor(Math.random()*15)*60000) : null,
        };
      });

      const inst = {
        id: uid(),
        checklistId: cl.id, checklistName: cl.name, checklistSnapshot: cl,
        kind: 'recurring', roleId: cl.roleId, assignedStaffIds: assignees,
        date: dateStr, appointmentLabel: '',
        createdAt: dueMs - 8 * 3600000, createdBy: 'system',
        dueAt: dueMs, status, completedAt, certifiedBy, certifiedAt,
        adminNotifiedAt: null, items,
      };
      newInstances.push(inst);

      newAudit.push({ id: uid(), at: inst.createdAt, action: 'instance_created',
        instanceId: inst.id, checklistId: cl.id, actorId: 'system',
        label: `Auto: ${cl.name} (${dateStr})` });
      if (status === 'completed') {
        newAudit.push({ id: uid(), at: certifiedAt, action: 'checklist_certified',
          instanceId: inst.id, checklistId: cl.id, actorId: certifiedBy,
          label: `${cl.name} — certified ready for inspection` });
      }
    }
  });

  // Add a few inspections: 2 fails, rest passes
  const completed = newInstances.filter(i => i.status === 'completed');
  const shuffled = [...completed].sort(() => Math.random() - 0.5).slice(0, Math.min(8, completed.length));
  shuffled.forEach((inst, idx) => {
    const item = inst.items[Math.floor(Math.random() * inst.items.length)];
    const pass = idx >= 2;
    const completer = state.staff.find(s => s.id === item.completedBy);
    newAudit.push({
      id: uid(), at: (inst.certifiedAt || inst.dueAt) + 60 * 60000,
      action: pass ? 'inspection_pass' : 'inspection_fail',
      instanceId: inst.id, itemId: item.id, actorId: ownerId,
      label: `Inspection ${pass ? '✓ passed' : '✗ failed'}: "${item.label}" (done by ${completer?.name || 'someone'})${pass ? '' : ' — needs attention'}`,
      photos: [],
    });
  });

  return {
    ...state,
    instances: [...newInstances, ...state.instances],
    auditLog: [...newAudit.sort((a,b) => b.at - a.at), ...state.auditLog],
  };
}

/* ============================================================
   STAFF CHECKLISTS DIALOG
   Quick view of every checklist a staff member is on, plus
   every checklist they're NOT on, with one-click toggling.
   ============================================================ */

// Is this staff member currently a responsible party for this checklist?
// Checklists can be explicitly assigned (assignedStaffIds) or implicitly
// via role membership (falls back to everyone in the role).
function staffOnChecklist(staff, cl) {
  if (!cl) return false;
  if (cl.assignedStaffIds && cl.assignedStaffIds.length > 0) {
    return cl.assignedStaffIds.includes(staff.id);
  }
  return !!staff.roleIds?.includes(cl.roleId);
}

function countAssignedChecklists(staff, state) {
  return state.checklists.filter(c => !c.archived && staffOnChecklist(staff, c)).length;
}

// Return the canonical assigned list for a checklist — if it has an explicit
// list, use that; otherwise materialize it from current role membership so
// toggles can work on a stable snapshot.
function resolveAssignedList(cl, state) {
  if (cl.assignedStaffIds && cl.assignedStaffIds.length > 0) {
    return cl.assignedStaffIds.slice();
  }
  return state.staff.filter(s => s.roleIds?.includes(cl.roleId)).map(s => s.id);
}

function StaffChecklistsDialog({ staff, state, dispatch, onClose }) {
  const [kindFilter, setKindFilter] = useState('all'); // 'all' | 'recurring' | 'event'
  const [includeArchived, setIncludeArchived] = useState(false);

  const pool = state.checklists.filter(c => {
    if (!includeArchived && c.archived) return false;
    if (kindFilter !== 'all' && c.kind !== kindFilter) return false;
    return true;
  });

  const assigned    = pool.filter(c =>  staffOnChecklist(staff, c));
  const notAssigned = pool.filter(c => !staffOnChecklist(staff, c));

  const toggle = (cl) => {
    const currentList = resolveAssignedList(cl, state);
    const on = currentList.includes(staff.id);
    const nextList = on
      ? currentList.filter(id => id !== staff.id)
      : Array.from(new Set([...currentList, staff.id]));
    dispatch({ type: 'CHECKLIST_SAVE', checklist: { ...cl, assignedStaffIds: nextList } });
  };

  const roleNames = (staff.roleIds || [])
    .map(rid => state.roles.find(r => r.id === rid)?.name)
    .filter(Boolean)
    .join(' + ') || 'No role assigned';

  const renderRow = (c, isOn) => {
    const role = state.roles.find(r => r.id === c.roleId);
    return (
      <div key={c.id}
        className={`flex items-start gap-3 p-3 rounded-lg border transition ${
          isOn ? 'bg-green-50 border-green-300' : 'bg-white border-slate-200 hover:border-slate-300'
        } ${c.archived ? 'opacity-70' : ''}`}>
        <button
          onClick={() => toggle(c)}
          className={`flex-shrink-0 w-6 h-6 rounded border-2 mt-0.5 flex items-center justify-center font-bold transition ${
            isOn ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300 hover:border-blue-500 text-transparent hover:text-slate-400'
          }`}
          title={isOn ? 'Remove from this checklist' : 'Assign to this checklist'}
          aria-label={isOn ? 'Remove' : 'Assign'}>
          ✓
        </button>
        <div className="flex-1 min-w-0">
          <div className="font-medium text-slate-900 flex items-center gap-2 flex-wrap">
            {c.name}
            {c.archived && <span className="pill bg-amber-100 text-amber-800">Archived</span>}
            {c.kind === 'event' && <span className="pill bg-indigo-100 text-indigo-800">Event</span>}
            {role && <span className="pill bg-slate-100 text-slate-600">{role.name}</span>}
          </div>
          <div className="text-xs text-slate-500 mt-0.5">
            {c.items.length} item{c.items.length === 1 ? '' : 's'}
            {c.kind === 'recurring' && c.schedule && <> · {scheduleLabel(c.schedule)}</>}
            {c.kind === 'event' && <> · SLA {c.slaMinutes}m</>}
          </div>
        </div>
      </div>
    );
  };

  return (
    <Modal title={`${staff.name} — assigned checklists`} onClose={onClose} wide>
      <div className="space-y-4">
        <div className="card p-3 bg-slate-50 border-slate-200 text-sm">
          <div className="flex items-start gap-2">
            <div className="text-lg leading-none">👤</div>
            <div>
              <div className="font-semibold text-slate-900">{staff.name}</div>
              <div className="text-xs text-slate-600">{roleNames}</div>
              <div className="text-xs text-slate-500 mt-1">
                Click the checkbox on any row to add or remove this person.
                Green rows are checklists they're already responsible for.
              </div>
            </div>
          </div>
        </div>

        <div className="flex items-center gap-2 flex-wrap">
          {[['all','All'],['recurring','Recurring'],['event','Event']].map(([k,l]) => (
            <button key={k}
              onClick={() => setKindFilter(k)}
              className={`btn text-xs ${kindFilter === k ? 'btn-primary' : 'btn-secondary'}`}>
              {l}
            </button>
          ))}
          <label className="flex items-center gap-1.5 text-xs text-slate-600 ml-2">
            <input type="checkbox" className="accent-blue-600"
              checked={includeArchived}
              onChange={e => setIncludeArchived(e.target.checked)} />
            Include archived
          </label>
        </div>

        <section>
          <h3 className="text-sm font-semibold text-slate-700 mb-2">
            Assigned <span className="pill bg-green-100 text-green-800">{assigned.length}</span>
          </h3>
          {assigned.length === 0
            ? <div className="card p-4 text-sm text-slate-400 italic">No checklists assigned to {staff.name.split(' ')[0]} yet.</div>
            : <div className="space-y-2">{assigned.map(c => renderRow(c, true))}</div>
          }
        </section>

        <section>
          <h3 className="text-sm font-semibold text-slate-700 mb-2">
            Not assigned <span className="pill bg-slate-100 text-slate-600">{notAssigned.length}</span>
          </h3>
          {notAssigned.length === 0
            ? <div className="card p-4 text-sm text-slate-400 italic">{staff.name.split(' ')[0]} is already on every checklist in this view.</div>
            : <div className="space-y-2">{notAssigned.map(c => renderRow(c, false))}</div>
          }
        </section>
      </div>
      <div className="flex justify-end mt-6">
        <button className="btn btn-primary" onClick={onClose}>Done</button>
      </div>
    </Modal>
  );
}

/* ============================================================
   TIME OFF DIALOG
   ============================================================ */
function TimeOffDialog({ staff, state, dispatch, onClose }) {
  const [start, setStart] = useState('');
  const [end, setEnd] = useState('');
  const [reason, setReason] = useState('');
  const syncEnabled = !!state.settings?.timeOffSyncUrl;
  const entries = (staff.timeOff || []).slice().sort((a, b) => a.start.localeCompare(b.start));
  const canAdd = start && end && end >= start;
  return (
    <Modal title={`Time off — ${staff.name}`} onClose={onClose} wide>
      {syncEnabled && (
        <div className="card p-3 bg-blue-50 border-blue-200 text-sm text-blue-900 mb-4">
          🔄 Time off is managed in the <strong>Benefit Tracker</strong> Google Sheet. Changes there sync to this app automatically. Manual edits here are disabled.
        </div>
      )}
      <div className="space-y-4">
        {!syncEnabled && (
          <div>
            <div className="text-sm font-medium text-slate-700 mb-2">Add time off</div>
            <div className="grid sm:grid-cols-4 gap-2">
              <div><label className="text-xs text-slate-500">Start</label>
                <input type="date" className="input" value={start} onChange={e => setStart(e.target.value)} /></div>
              <div><label className="text-xs text-slate-500">End</label>
                <input type="date" className="input" value={end} onChange={e => setEnd(e.target.value)} /></div>
              <div className="sm:col-span-2"><label className="text-xs text-slate-500">Reason (optional)</label>
                <input className="input" placeholder="PTO, sick, etc." value={reason} onChange={e => setReason(e.target.value)} /></div>
            </div>
            <button className="btn btn-primary mt-2" disabled={!canAdd}
              onClick={() => {
                dispatch({ type: 'STAFF_ADD_TIMEOFF', staffId: staff.id, start, end, reason });
                setStart(''); setEnd(''); setReason('');
              }}>Add</button>
          </div>
        )}
        <div>
          <div className="text-sm font-medium text-slate-700 mb-2">Scheduled ({entries.length})</div>
          {entries.length === 0 ? (
            <div className="text-xs text-slate-400 italic">No time off scheduled.</div>
          ) : (
            <ul className="divide-y divide-slate-100 border border-slate-200 rounded-lg overflow-hidden">
              {entries.map(t => (
                <li key={t.id} className="flex items-center gap-2 px-3 py-2">
                  <div className="flex-1 text-sm">
                    <div>
                      <span className="font-medium text-slate-800">{t.start}</span>
                      {t.start !== t.end && <> → <span className="font-medium text-slate-800">{t.end}</span></>}
                      {t.hours && t.hours !== 'Full Day' && <span className="pill bg-amber-100 text-amber-800 ml-2">{t.hours}</span>}
                      {t.synced && <span className="pill bg-blue-100 text-blue-800 ml-2">🔄 synced</span>}
                    </div>
                    {(t.requestType || t.reason) && (
                      <div className="text-xs text-slate-500 mt-0.5">
                        {t.requestType && <span className="font-medium">{t.requestType}</span>}
                        {t.requestType && t.paidType && ' · '}
                        {t.paidType && <span>{t.paidType}</span>}
                        {(t.requestType || t.paidType) && t.reason && t.reason !== t.requestType && ' — '}
                        {t.reason && t.reason !== t.requestType && <span>{t.reason}</span>}
                      </div>
                    )}
                  </div>
                  {!syncEnabled && !t.synced && (
                    <button className="btn btn-ghost text-red-600 text-xs"
                      onClick={() => dispatch({ type: 'STAFF_REMOVE_TIMEOFF', staffId: staff.id, entryId: t.id })}>
                      Remove
                    </button>
                  )}
                </li>
              ))}
            </ul>
          )}
        </div>
      </div>
      <div className="flex justify-end mt-6">
        <button className="btn btn-primary" onClick={onClose}>Done</button>
      </div>
    </Modal>
  );
}

/* ============================================================
   COMPLIANCE CARD
   ============================================================ */
function ComplianceCard({ user, state, windowDays = 30 }) {
  const c = useMemo(() => getMyCompliance(user, state, windowDays), [user, state, windowDays]);
  if ((user.roleIds || []).length === 0) return null;

  if (c.total === 0) {
    return (
      <div className="card p-3 bg-slate-50 border-slate-200 text-sm text-slate-700">
        <strong>Your compliance:</strong> no past-due checklists or inspections in the last {windowDays} days yet. Keep going — this card will fill in as data builds up.
      </div>
    );
  }

  const tier = c.pct >= 90 ? 'green' : c.pct >= 70 ? 'amber' : 'red';
  const theme = {
    green: { card: 'bg-green-50 border-green-300', big: 'text-green-800',  sub: 'text-green-900', bar: 'bg-green-500' },
    amber: { card: 'bg-amber-50 border-amber-300', big: 'text-amber-800',  sub: 'text-amber-900', bar: 'bg-amber-500' },
    red:   { card: 'bg-red-50 border-red-300',     big: 'text-red-800',    sub: 'text-red-900',   bar: 'bg-red-500'   },
  }[tier];
  const roleNames = user.roleIds.map(rid => state.roles.find(r => r.id === rid)?.name).filter(Boolean).join(' + ');

  return (
    <div className={`card p-4 border ${theme.card}`}>
      <div className="flex items-center gap-4 flex-wrap">
        <div className={`text-4xl font-bold ${theme.big}`}>{c.pct}%</div>
        <div className="flex-1 min-w-[12rem]">
          <div className={`font-semibold ${theme.sub}`}>Your compliance score</div>
          <div className="text-xs text-slate-600">On-time checklists + inspection pass rate · last {windowDays} days · {user.name.split(' ')[0]}, {roleNames}</div>
        </div>
      </div>

      <div className="mt-3 h-2 bg-slate-200 rounded-full overflow-hidden">
        <div className={`h-full transition-all ${theme.bar}`} style={{ width: `${c.pct}%` }} />
      </div>

      <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3">
        <div className="bg-white/60 rounded p-3">
          <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide">Checklist on-time</div>
          {c.checklistTotal === 0 ? (
            <div className="text-xs text-slate-500 mt-1">No past-due checklists yet.</div>
          ) : (
            <>
              <div className="mt-1 text-sm text-slate-800"><strong className="text-green-700">{c.onTime}</strong> on time / {c.checklistTotal} total</div>
              <div className="text-xs text-slate-500 mt-0.5">{c.late} late · {c.missed} missed</div>
            </>
          )}
        </div>
        <div className="bg-white/60 rounded p-3">
          <div className="text-xs font-semibold text-slate-700 uppercase tracking-wide">Inspections passed</div>
          {c.inspectionTotal === 0 ? (
            <div className="text-xs text-slate-500 mt-1">No inspections on your work yet.</div>
          ) : (
            <>
              <div className="mt-1 text-sm text-slate-800"><strong className="text-green-700">{c.passed}</strong> passed / {c.inspectionTotal} total</div>
              <div className="text-xs text-slate-500 mt-0.5">{c.failed} failed</div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   FAILED-INSPECTION NOTIFICATIONS
   Shows staff their recent failed inspections. Bulk "acknowledge"
   dismisses them from this banner but the audit log keeps them.
   ============================================================ */
function FailedInspectionsBanner({ user, state, dispatch }) {
  const ackIds = new Set((state.acknowledgedFailures || {})[user.id] || []);
  const recent = useMemo(() => {
    const cutoff = now() - 14 * 86400000;
    return state.auditLog.filter(e => {
      if (e.action !== 'inspection_fail') return false;
      if (e.at < cutoff) return false;
      if (ackIds.has(e.id)) return false;
      const inst = state.instances.find(i => i.id === e.instanceId);
      if (!inst) return false;
      const item = inst.items.find(it => it.id === e.itemId);
      if (!item) return false;
      return item.completedBy === user.id;
    });
  }, [state, user, ackIds]);

  if (recent.length === 0) return null;

  return (
    <div className="card p-4 border-red-400 bg-red-50 shadow-sm">
      <div className="flex items-start justify-between gap-2 flex-wrap">
        <div className="flex items-start gap-2 flex-1">
          <span className="text-xl leading-none mt-0.5">⚠️</span>
          <div>
            <div className="font-semibold text-red-900">
              {recent.length} failed inspection{recent.length === 1 ? '' : 's'} on your work
            </div>
            <div className="text-xs text-red-800 mt-0.5">
              An admin inspected an item you completed and flagged it. Review each, fix the work if needed, then acknowledge.
            </div>
          </div>
        </div>
        <button
          onClick={() => dispatch({ type: 'ACKNOWLEDGE_FAILURES', userId: user.id, entryIds: recent.map(e => e.id) })}
          className="btn btn-secondary text-xs">I've seen &amp; addressed these</button>
      </div>
      <ul className="mt-3 space-y-2">
        {recent.slice(0, 6).map(e => {
          const inspector = state.staff.find(s => s.id === e.actorId)?.name || e.actorId;
          return (
            <li key={e.id} className="card p-3 bg-white border-red-200">
              <div className="text-sm text-slate-900">{e.label}</div>
              <div className="text-xs text-slate-500 mt-0.5">Inspected by {inspector} · {fmtRel(e.at)}</div>
              {e.photos && e.photos.length > 0 && (
                <div className="flex gap-1 mt-2 flex-wrap">
                  {e.photos.map((src, i) => (
                    <img key={i} src={src} className="w-16 h-16 object-cover rounded border border-slate-200" alt="inspection" />
                  ))}
                </div>
              )}
            </li>
          );
        })}
        {recent.length > 6 && <li className="text-xs text-red-800">+ {recent.length - 6} more (see audit log)</li>}
      </ul>
    </div>
  );
}

/* ============================================================
   UI HELPERS
   ============================================================ */
function Section({ title, count, empty, children, collapsible, defaultCollapsed }) {
  const [collapsed, setCollapsed] = useState(!!defaultCollapsed);
  const isEmpty = !React.Children.count(children);
  return (
    <section>
      <div className="flex items-center justify-between mb-2">
        <button className={`flex items-center gap-2 ${collapsible ? 'cursor-pointer' : 'cursor-default'}`} onClick={() => collapsible && setCollapsed(c => !c)}>
          <h3 className="font-semibold text-slate-900">{title}</h3>
          {typeof count === 'number' && <span className="pill bg-slate-100 text-slate-600">{count}</span>}
          {collapsible && <span className="text-slate-400 text-xs">{collapsed ? '▸' : '▾'}</span>}
        </button>
      </div>
      {!collapsed && (isEmpty
        ? <div className="card p-6 text-center text-slate-400 text-sm">{empty || 'Nothing here yet.'}</div>
        : <div className="space-y-3">{children}</div>)}
    </section>
  );
}
function Field({ label, hint, children }) {
  return (
    <label className="block">
      <div className="text-sm font-medium text-slate-700 mb-1">{label}</div>
      {children}
      {hint && <div className="text-xs text-slate-500 mt-1">{hint}</div>}
    </label>
  );
}
function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const h = (e) => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);
  // Modal layout: the scroll container is the fixed overlay itself. The
  // inner wrapper uses `min-h-full` + flex centering so short modals stay
  // vertically centered, while tall ones grow past the viewport and the
  // outer overlay scrolls — which means the header is always reachable.
  // The header is sticky so the title + close button stay in view while
  // scrolling long forms (e.g. the checklist editor).
  return (
    <div className="fixed inset-0 z-50 bg-slate-900/40 overflow-y-auto">
      <div className="min-h-full flex items-start sm:items-center justify-center p-4">
        <div className={`card shadow-xl w-full ${wide ? 'max-w-2xl' : 'max-w-md'} my-4`}>
          <div className="sticky top-0 z-10 bg-white rounded-t-xl px-5 py-3 border-b border-slate-200 flex items-center justify-between">
            <div className="font-semibold text-slate-900">{title}</div>
            <button onClick={onClose} className="btn btn-ghost" aria-label="Close">✕</button>
          </div>
          <div className="p-5">{children}</div>
        </div>
      </div>
    </div>
  );
}
