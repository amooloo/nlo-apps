/**
 * Resize + compress an image File to a JPEG data URL so it fits in localStorage.
 * Keeps the aspect ratio, caps the longest side at maxDim.
 */
function compressImage(file, maxDim = 1280, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', quality));
      URL.revokeObjectURL(img.src);
    };
    img.onerror = (e) => { URL.revokeObjectURL(img.src); reject(e); };
    img.src = URL.createObjectURL(file);
  });
}

/**
 * Personal compliance score for a user over the last `windowDays` days.
 * Combines two metrics into one percentage:
 *   1. On-time checklist certifications for roles the user belongs to
 *   2. Inspection pass rate for items this user personally completed
 * Returns a breakdown so the UI can show where the score came from.
 */
function getMyCompliance(user, state, windowDays = 30) {
  const windowStart = now() - windowDays * 86400000;
  const roleIds = user.roleIds || [];

  // 1) CHECKLIST ON-TIME
  const eligibleInstances = state.instances.filter(inst => {
    if (!roleIds.includes(inst.roleId)) return false;
    if (inst.dueAt < windowStart) return false;
    if (inst.dueAt > now())        return false;
    return true;
  });
  let onTime = 0, late = 0, missed = 0;
  eligibleInstances.forEach(inst => {
    if (inst.status === 'completed') {
      const finishedAt = inst.certifiedAt || inst.completedAt;
      if (finishedAt && finishedAt <= inst.dueAt) onTime++;
      else late++;
    } else {
      missed++;
    }
  });
  const checklistTotal = eligibleInstances.length;

  // 2) INSPECTIONS on items THIS user completed
  let passed = 0, failed = 0;
  state.auditLog.forEach(e => {
    if (e.at < windowStart) return;
    if (e.action !== 'inspection_pass' && e.action !== 'inspection_fail') return;
    const inst = state.instances.find(i => i.id === e.instanceId);
    if (!inst) return;
    const item = inst.items.find(it => it.id === e.itemId);
    if (!item) return;
    if (item.completedBy !== user.id) return;
    if (e.action === 'inspection_pass') passed++;
    else failed++;
  });
  const inspectionTotal = passed + failed;

  // Combined score
  const good = onTime + passed;
  const total = checklistTotal + inspectionTotal;
  const pct = total > 0 ? Math.round((good / total) * 100) : null;

  return {
    pct,
    onTime, late, missed, checklistTotal,
    passed, failed, inspectionTotal,
    total, windowDays,
  };
}

const scheduleRunsToday = (s) => {
  const dow = dayOfWeek();
  switch (s?.freq) {
    case 'daily':    return true;
    case 'weekdays': return dow >= 1 && dow <= 4; // Mon-Thu (NLO work week)
    case 'weekends': return dow === 0 || dow === 6;
    case 'weekly':   return dow === (s.weekday ?? 1);
    case 'monthly':  return dayOfMonthNum() === (s.dayOfMonth ?? 1);
    case 'quarterly': {
      // Fires every 3 months starting from startMonth (0=Jan, 1=Feb, 2=Mar),
      // on the configured dayOfMonth. startMonth % 3 anchors the cycle.
      const startMonth = (s.startMonth ?? 0) % 3;
      const curMonth   = new Date().getMonth();
      return ((curMonth - startMonth) % 3 + 3) % 3 === 0
          && dayOfMonthNum() === (s.dayOfMonth ?? 1);
    }
    default:         return false;
  }
};

// Idempotent seed migration. Adds any DEFAULT_STATE.checklists whose `id`
// isn't already present in state.checklists. Never deletes, never modifies
// existing checklists — only adds net-new ones.
//
// NOTE: we intentionally do NOT short-circuit on _seedVersion. The previous
// version did, but hit a subtle bug: call sites pass `{ ...DEFAULT_STATE, ...cloud }`
// so the _seedVersion field from DEFAULT_STATE leaks through (cloud rarely has it),
// and the short-circuit fires even though the cloud checklists haven't been merged.
// Checking the actual checklist IDs is the source of truth and cheap enough to
// run on every hydrate.
function applySeedMigrations(state) {
  if (!state || typeof state !== 'object') return state;
  const existingIds = new Set((state.checklists || []).map(c => c && c.id).filter(Boolean));
  const deletedIds = new Set(state.deletedChecklistIds || []);
  // Don't re-seed anything the user explicitly deleted — that's what made
  // deletes appear to "come back at the bottom of the list" before.
  const missing = (DEFAULT_STATE.checklists || []).filter(c =>
    !existingIds.has(c.id) && !deletedIds.has(c.id)
  );
  if (missing.length === 0) {
    return state._seedVersion === CURRENT_SEED_VERSION
      ? state
      : { ...state, _seedVersion: CURRENT_SEED_VERSION };
  }
  console.log('[NLO Checklists] Seed migration → adding',
    missing.length, 'new checklists:', missing.map(c => c.id).join(', '));
  return {
    ...state,
    checklists: [...(state.checklists || []), ...missing],
    _seedVersion: CURRENT_SEED_VERSION,
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return applySeedMigrations({ ...DEFAULT_STATE, ...JSON.parse(raw) });
  } catch {}
  return DEFAULT_STATE;
}
// Persist state to localStorage. We used to ignore errors here which meant
// a full quota (typically caused by inspection photos piling up) would
// silently fail — the in-memory state updated, but on reload the old data
// came back, so saves appeared to "not stick". Now we warn loudly and keep
// a flag so the UI can surface a persistent banner.
let _lastSaveError = null;
let _alertedOnce = false;

function saveState(s) {

/**
 * Fetch approved time-off + holidays from the Apps Script web app.
 * Called on app mount (if URL configured) and from the Sync-now button.
 */
async function syncTimeOff(url, dispatch) {
  if (!url) return;
  try {
    // Append ?action=getchecklistsync to hit our handler inside the shared doGet dispatcher
    const separator = url.includes('?') ? '&' : '?';
    const full = url + separator + 'action=getchecklistsync';
    const res = await fetch(full, { method: 'GET', redirect: 'follow' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.ok === false) throw new Error(data.error || 'Sync returned an error.');
    dispatch({ type: 'SYNC_TIMEOFF_RESULT', data });
  } catch (err) {
    console.warn('Time-off sync failed:', err);
    dispatch({ type: 'SYNC_TIMEOFF_ERROR', error: String(err?.message || err) });
  }
}

function resolveAssignees(checklist, state, dateStr) {
  const base = (checklist.assignedStaffIds && checklist.assignedStaffIds.length > 0)
    ? checklist.assignedStaffIds.slice()
    : (state?.staff || []).filter(s => s.roleIds?.includes(checklist.roleId)).map(s => s.id);
  // Remove anyone who's on time off for the instance date
  if (dateStr && state) {
    return base.filter(id => {
      const s = state.staff.find(x => x.id === id);
      return s && !isStaffOff(s, dateStr);
    });
  }
  return base;
}

function reducer(state, action) {
  let next = state;
  switch (action.type) {
    case 'HYDRATE':    return action.state;
    case '__NOOP__':   return state;

    case 'ROLE_ADD':
      next = { ...state, roles: [...state.roles, { id: uid(), name: action.name }] }; break;
    case 'ROLE_UPDATE':
      next = { ...state, roles: state.roles.map(r => r.id === action.id ? { ...r, name: action.name } : r) }; break;
    case 'ROLE_DELETE':
      next = { ...state, roles: state.roles.filter(r => r.id !== action.id) }; break;

    case 'STAFF_ADD':
      next = { ...state, staff: [...state.staff, { id: uid(), name: action.name, appRole: action.appRole || 'staff', roleIds: action.roleIds || [] }] }; break;
    case 'STAFF_UPDATE':
      next = { ...state, staff: state.staff.map(s => s.id === action.id ? { ...s, ...action.patch } : s) }; break;
    case 'STAFF_DELETE':
      next = { ...state, staff: state.staff.filter(s => s.id !== action.id) }; break;

    case 'CHECKLIST_SAVE': {
      const cl = action.checklist;
      const exists = state.checklists.some(x => x.id === cl.id);
      next = { ...state, checklists: exists ? state.checklists.map(x => x.id === cl.id ? cl : x) : [...state.checklists, cl] };
      break;
    }
    case 'CHECKLIST_DELETE':
      // Permanent delete. Record the id in deletedChecklistIds so the seed
      // migration won't re-add it on next hydrate (seed checklists have
      // stable ids; user-created ones with uid() are safe to list here too).
      next = {
        ...state,
        checklists: state.checklists.filter(c => c.id !== action.id),
        deletedChecklistIds: Array.from(new Set([...(state.deletedChecklistIds || []), action.id])),
      };
      break;
    case 'CHECKLIST_ARCHIVE':
      next = {
        ...state,
        checklists: state.checklists.map(c =>
          c.id === action.id ? { ...c, archived: true, archivedAt: now() } : c
        ),
      };
      break;
    case 'CHECKLIST_UNARCHIVE':
      next = {
        ...state,
        checklists: state.checklists.map(c =>
          c.id === action.id ? { ...c, archived: false, archivedAt: null } : c
        ),
      };
      break;
    case 'CHECKLIST_RESTORE_SEED':
      // Pull the named seed id back out of deletedChecklistIds so the next
      // migration re-seeds it. Only usable for ids that exist in DEFAULT_STATE.
      next = {
        ...state,
        deletedChecklistIds: (state.deletedChecklistIds || []).filter(id => id !== action.id),
      };
      break;

    case 'INSTANCE_CREATE': {
      const cl = state.checklists.find(c => c.id === action.checklistId);
      if (!cl) return state;
      const inst = makeInstance(cl, { appointmentLabel: action.appointmentLabel, actorId: action.actorId, state });
      next = { ...state, instances: [inst, ...state.instances] };
      next = audit(next, {
        action: 'instance_created', instanceId: inst.id, checklistId: cl.id, actorId: action.actorId,
        label: cl.kind === 'event' ? `${cl.name} — ${action.appointmentLabel}` : cl.name,
      });
      break;
    }
    case 'INSTANCES_AUTO_CREATE': {
      const date = todayISO();
      const t = now();
      // Office-wide holiday → skip recurring generation entirely for today
      if (isHoliday(date, state.settings?.holidays)) return state;
      const newOnes = [];
      state.checklists.forEach(cl => {
        if (cl.kind !== 'recurring') return;
        if (cl.archived) return;
        if (!scheduleRunsToday(cl.schedule)) return;
        if (cl.effectiveFrom  && t < cl.effectiveFrom)  return;
        if (cl.effectiveUntil && t > cl.effectiveUntil) return;
        const already = state.instances.some(i => i.checklistId === cl.id && i.date === date);
        if (already) return;
        const inst = makeInstance(cl, { actorId: 'system', state });
        if (inst.assignedStaffIds.length === 0) return;
        newOnes.push(inst);
      });
      if (!newOnes.length) return state;
      next = { ...state, instances: [...newOnes, ...state.instances] };
      newOnes.forEach(inst => {
        next = audit(next, { action: 'instance_created', instanceId: inst.id, checklistId: inst.checklistId, actorId: 'system', label: `Auto: ${inst.checklistName} (${inst.date})` });
      });
      break;
    }
    case 'INSTANCE_DELETE':
      next = { ...state, instances: state.instances.filter(i => i.id !== action.id) }; break;

    case 'ITEM_TOGGLE': {
      let targetLabel = '', wasDone = false;
      const instances = state.instances.map(inst => {
        if (inst.id !== action.instanceId) return inst;
        if (inst.status === 'completed') return inst; // can't edit completed
        const items = inst.items.map(it => {
          if (it.id !== action.itemId) return it;
          wasDone = it.status === 'done';
          if (!wasDone) targetLabel = it.label;
          return !wasDone
            ? { ...it, status: 'done', completedBy: action.actorId, completedAt: now() }
            : { ...it, status: 'pending', completedBy: null, completedAt: null };
        });
        // NOTE: NO auto-completion here. Completion requires explicit certification.
        return { ...inst, items };
      });
      next = { ...state, instances };
      next = audit(next, {
        action: targetLabel ? 'item_completed' : 'item_reopened',
        instanceId: action.instanceId, itemId: action.itemId, actorId: action.actorId,
        label: targetLabel || '(item reopened)',
      });
      break;
    }

    case 'CHECKLIST_CERTIFY': {
      const inst = state.instances.find(i => i.id === action.instanceId);
      if (!inst) return state;
      if (inst.items.some(i => i.status !== 'done')) return state; // guard
      next = {
        ...state,
        instances: state.instances.map(i => i.id === action.instanceId
          ? { ...i, status: 'completed', completedAt: now(), certifiedBy: action.actorId, certifiedAt: now(), certificationNote: action.note || '' }
          : i),
      };
      next = audit(next, {
        action: 'checklist_certified', instanceId: inst.id, checklistId: inst.checklistId, actorId: action.actorId,
        label: `${inst.checklistName}${inst.kind === 'event' && inst.appointmentLabel ? ' — ' + inst.appointmentLabel : ''} — certified ready for inspection${action.note ? ': ' + action.note : ''}`,
      });
      break;
    }

    case 'ITEM_ASSIGN':
      next = {
        ...state,
        instances: state.instances.map(inst => inst.id !== action.instanceId ? inst : {
          ...inst,
          items: inst.items.map(it => it.id !== action.itemId ? it : { ...it, assignedTo: action.assigneeId ?? null }),
        }),
      };
      next = audit(next, {
        action: 'item_reassigned', instanceId: action.instanceId, itemId: action.itemId, actorId: action.actorId,
        label: action.assigneeId ? `assigned to ${state.staff.find(s => s.id === action.assigneeId)?.name || '?'}` : 'set to unassigned',
      });
      break;

    case 'INSTANCE_MARK_NOTIFIED':
      next = { ...state, instances: state.instances.map(i => i.id === action.id ? { ...i, adminNotifiedAt: now() } : i) };
      next = audit(next, { action: 'overdue_alert', instanceId: action.id, actorId: 'system', label: 'Admin alerted (overdue)' });
      break;

    case 'INSPECTION_BATCH': {
      next = state;
      (action.results || []).forEach(r => {
        next = audit(next, {
          action: r.result === 'pass' ? 'inspection_pass' : 'inspection_fail',
          instanceId: r.instanceId,
          itemId: r.itemId,
          actorId: action.inspectorId,
          label: `Inspection ${r.result === 'pass' ? '✓ passed' : '✗ failed'}: "${r.itemLabel}" (done by ${r.completedByName})${r.note ? ' — ' + r.note : ''}`,
          photos: r.photos || [],
        });
      });
      break;
    }

    case 'ACKNOWLEDGE_FAILURES': {
      const current = state.acknowledgedFailures?.[action.userId] || [];
      const merged = Array.from(new Set([...current, ...(action.entryIds || [])]));
      next = {
        ...state,
        acknowledgedFailures: { ...(state.acknowledgedFailures || {}), [action.userId]: merged },
      };
      break;
    }

    case 'STAFF_ADD_TIMEOFF': {
      next = {
        ...state,
        staff: state.staff.map(s => s.id !== action.staffId ? s : {
          ...s,
          timeOff: [...(s.timeOff || []), { id: uid(), start: action.start, end: action.end, reason: action.reason || '' }]
        })
      };
      break;
    }
    case 'STAFF_REMOVE_TIMEOFF': {
      next = {
        ...state,
        staff: state.staff.map(s => s.id !== action.staffId ? s : {
          ...s,
          timeOff: (s.timeOff || []).filter(t => t.id !== action.entryId)
        })
      };
      break;
    }

    case 'SEED_DEMO': {
      next = seedDemoHistory(state);
      break;
    }

    case 'SETTINGS_UPDATE':
      next = { ...state, settings: { ...(state.settings || {}), ...action.patch } };
      break;

    case 'SYNC_TIMEOFF_RESULT': {
      const { timeOff = [], holidays = [], syncedAt } = action.data || {};
      const norm = (n) => (n || '').toLowerCase().replace(/^\s*dr\.?\s+/, '').trim();
      const byStaff = {};
      timeOff.forEach(entry => {
        const s = state.staff.find(st => norm(st.name) === norm(entry.employeeName));
        if (!s) return;
        (byStaff[s.id] ||= []).push({
          // Prefer the upstream request ID so we can detect re-syncs idempotently later
          id: entry.id || uid(),
          start: entry.start,
          end: entry.end,
          reason: entry.reason || '',
          // Future-proofing: carry these through so we can do smarter logic later
          // (half-day handling, filter by request type, etc.) without another Apps Script redeploy
          requestType: entry.requestType || '',
          paidType:    entry.paidType    || '',
          hours:       entry.hours       || '',
          synced: true,
        });
      });
      next = {
        ...state,
        staff: state.staff.map(s => ({ ...s, timeOff: byStaff[s.id] || [] })),
        settings: {
          ...(state.settings || {}),
          lastSyncAt: syncedAt || new Date().toISOString(),
          lastSyncError: null,
          holidays: holidays || [],
        },
      };
      break;
    }

    case 'SYNC_TIMEOFF_ERROR':
      next = { ...state, settings: {
        ...(state.settings || {}),
        lastSyncAt: new Date().toISOString(),
        lastSyncError: action.error,
      } };
      break;

    case 'RESET_ALL':
      next = DEFAULT_STATE; break;
    default:
      return state;
  }
  saveState(next);
  return next;
}

/* ============================================================
   ROOT
   ============================================================ */
function AppRoot() {
  const [state, dispatch] = useReducer(reducer, undefined, loadState);
  const [currentUserId, setCurrentUserId] = useState(() => localStorage.getItem('currentUserId'));
  const currentUser = state.staff.find(s => s.id === currentUserId);

  // ---- FIREBASE SYNC ----
  // authState: 'checking' (waiting on onAuthStateChanged) | 'signed-out' | 'signed-in' | 'blocked'
  // syncStatus: 'connecting' | 'synced' | 'offline' | 'error' | 'disabled'
  const [authState, setAuthState] = useState('checking');
  const [authErrorMsg, setAuthErrorMsg] = useState('');
  const [firebaseUser, setFirebaseUser] = useState(null);
  const [syncStatus, setSyncStatus] = useState('connecting');
  const [syncErrorMsg, setSyncErrorMsg] = useState('');
  // True once the Firebase root has been loaded (even if empty) — only then
  // do we start pushing local changes upstream.
  const hydratedFromCloudRef = useRef(false);
  // JSON of the last value we wrote up OR received down, used to squash echo
  // loops where our own write comes back through the on('value') listener.
  const lastSyncJSONRef = useRef(null);

  useEffect(() => { dispatch({ type: 'INSTANCES_AUTO_CREATE' }); }, []);

  // Auto-sync time-off from Google Sheet on mount if a URL is configured
  useEffect(() => {
    const url = state.settings?.timeOffSyncUrl;
    if (url) syncTimeOff(url, dispatch);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);
  useEffect(() => {
    const id = setInterval(() => dispatch({ type: 'INSTANCES_AUTO_CREATE' }), 5 * 60000);
    return () => clearInterval(id);
  }, []);

  useEffect(() => {
    const h = (e) => {
      if (e.key === STORAGE_KEY && e.newValue) {
        try { dispatch({ type: 'HYDRATE', state: JSON.parse(e.newValue) }); } catch {}
      }
    };
    window.addEventListener('storage', h);
    return () => window.removeEventListener('storage', h);
  }, []);

  const [, tick] = useState(0);
  useEffect(() => { const id = setInterval(() => tick(t => t+1), 30000); return () => clearInterval(id); }, []);

  // Firebase: watch auth state. When a signed-in, allowed user appears, we
  // let the sync effect below run. If someone signs in with a non-allowed
  // email (e.g. personal gmail), we sign them back out and show the gate.
  useEffect(() => {
    if (!ensureFirebaseApp() || !window.firebase?.auth) {
      console.warn('[NLO Checklists] Firebase SDK not available — local-only mode.');
      setSyncStatus('disabled');
      setAuthState('signed-out');
      return;
    }
    const auth = window.firebase.auth();
    const unsub = auth.onAuthStateChanged((user) => {
      if (!user) {
        setFirebaseUser(null);
        setAuthState('signed-out');
        // Reset sync bookkeeping so a re-login does a fresh hydrate.
        hydratedFromCloudRef.current = false;
        lastSyncJSONRef.current = null;
        setSyncStatus('connecting');
        return;
      }
      const email = (user.email || '').toLowerCase();
      if (!isAllowedEmail(email)) {
        setAuthErrorMsg(`Access denied for ${email || 'this account'}. Only authorized accounts can sign in.`);
        auth.signOut();
        setAuthState('blocked');
        return;
      }
      setAuthErrorMsg('');
      setFirebaseUser(user);
      setAuthState('signed-in');
    });
    return () => unsub();
  }, []);

  // Sync effect: only runs once we have a signed-in, allowed Firebase user.
  // Cloud-wins hydrate, then subscribe to live updates.
  useEffect(() => {
    if (!firebaseUser) return;
    if (!window.firebase?.database) {
      setSyncStatus('disabled');
      return;
    }
    let cancelled = false;
    let cleanup = () => {};

    (async () => {
      try {
        const ref = window.firebase.database().ref(FB_ROOT);
        const snap = await ref.once('value');
        if (cancelled) return;

        const cloud = snap.val();
        if (cloud && typeof cloud === 'object') {
          const hydrated = applySeedMigrations({ ...DEFAULT_STATE, ...cloud });
          lastSyncJSONRef.current = JSON.stringify(hydrated);
          dispatch({ type: 'HYDRATE', state: hydrated });
        } else {
          // Empty cloud: current local state will be pushed up on next tick.
          lastSyncJSONRef.current = null;
        }
        hydratedFromCloudRef.current = true;
        setSyncStatus('synced');
        setSyncErrorMsg('');

        const onValue = (s) => {
          const val = s.val();
          if (!val || typeof val !== 'object') return;
          const incoming = applySeedMigrations({ ...DEFAULT_STATE, ...val });
          const incomingJSON = JSON.stringify(incoming);
          if (incomingJSON === lastSyncJSONRef.current) return; // echo
          lastSyncJSONRef.current = incomingJSON;
          dispatch({ type: 'HYDRATE', state: incoming });
        };
        ref.on('value', onValue);

        const connRef = window.firebase.database().ref('.info/connected');
        const onConn = (c) => {
          if (cancelled) return;
          if (c.val() === true) setSyncStatus('synced');
          else setSyncStatus('offline');
        };
        connRef.on('value', onConn);

        cleanup = () => {
          try { ref.off('value', onValue); } catch {}
          try { connRef.off('value', onConn); } catch {}
        };
      } catch (err) {
        console.error('[NLO Checklists] Firebase sync init failed:', err);
        if (!cancelled) {
          setSyncStatus('error');
          setSyncErrorMsg(err?.code ? (err.code + ': ' + (err.message || '')) : (err?.message || String(err)));
        }
      }
    })();

    return () => { cancelled = true; cleanup(); };
  }, [firebaseUser]);

  // Push local state changes up to Firebase once we've hydrated from cloud.
  // Echo-suppression via lastSyncJSONRef: if the JSON of what we're about to
  // write matches what just came down the listener, we skip the write.
  useEffect(() => {
    if (!firebaseUser) return;
    if (!hydratedFromCloudRef.current) return;
    if (!window.firebase?.database) return;
    const asJSON = JSON.stringify(state);
    if (asJSON === lastSyncJSONRef.current) return;
    lastSyncJSONRef.current = asJSON;
    window.firebase.database().ref(FB_ROOT).set(state).catch((err) => {
      console.error('[NLO Checklists] Firebase write failed:', err);
      setSyncStatus('error');
      setSyncErrorMsg(err?.code ? (err.code + ': ' + (err.message || '')) : (err?.message || String(err)));
    });
  }, [state, firebaseUser]);

  const setUser = (id) => {
    setCurrentUserId(id);
    if (id) localStorage.setItem('currentUserId', id); else localStorage.removeItem('currentUserId');
  };

  // While Firebase figures out whether we're signed in, show a minimal
  // splash instead of briefly flashing the Google sign-in screen.
  if (authState === 'checking') {
    return (
      <div className="min-h-screen flex items-center justify-center text-slate-400 text-sm">
        Loading…
      </div>
    );
  }

  // Not signed into Firebase → show Google gate. Covers 'signed-out' and
  // 'blocked' (wrong email) — in the blocked case the error banner is shown.
  if (authState !== 'signed-in') {
    return <GoogleSignInScreen error={authErrorMsg} />;
  }

  // Signed into Firebase but not yet pointed at a staff member → staff picker.
  if (!currentUser) return <Login staff={state.staff} onPick={setUser} />;

  const syncBadge = {
    connecting: { text: 'Connecting to cloud…',                     cls: 'text-slate-400' },
    synced:     { text: '☁ Synced across devices',                   cls: 'text-emerald-600' },
    offline:    { text: '⚠ Offline — changes will sync when online', cls: 'text-amber-600' },
    error:      { text: '⚠ Sync error',                              cls: 'text-red-600' },
    disabled:   { text: 'Local only — Firebase SDK not loaded',      cls: 'text-slate-400' },
  }[syncStatus] || { text: '', cls: '' };

  return (
    <div className="min-h-screen flex flex-col">
      <Header user={currentUser} state={state} onLogout={() => setUser(null)} />
      {currentUser.appRole === 'admin'
        ? <AdminView state={state} dispatch={dispatch} user={currentUser} />
        : <StaffView state={state} dispatch={dispatch} user={currentUser} />}
      <footer className={`text-center text-xs py-4 ${syncBadge.cls}`}>
        <div>{syncBadge.text}</div>
        {syncStatus === 'error' && syncErrorMsg && (
          <div className="mt-1 text-[11px] text-red-500 max-w-xl mx-auto break-words px-4">
            {syncErrorMsg}
          </div>
        )}
      </footer>
    </div>
  );
}

/* ============================================================
   GOOGLE SIGN-IN GATE
   Sits in front of the staff picker. NLO domain accounts (plus the
   owner's gmail) are allowed; anyone else gets signed out immediately.
   Matches inventory-dashboard.html so the same Google identities work
   across every NLO app. Firebase persists the session, so staff sign
   in once per device and from then on go straight to the staff picker.
   ============================================================ */
function GoogleSignInScreen({ error }) {
  const [signing, setSigning] = useState(false);
  const [localErr, setLocalErr] = useState('');

  const handleSignIn = () => {
    setSigning(true);
    setLocalErr('');
    if (!ensureFirebaseApp() || !window.firebase?.auth) {
      setLocalErr('Firebase is not loaded. Check your internet connection and reload.');
      setSigning(false);
      return;
    }
    const provider = new window.firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    window.firebase.auth().signInWithPopup(provider)
      .then((result) => {
        const email = (result.user?.email || '').toLowerCase();
        if (!isAllowedEmail(email)) {
          window.firebase.auth().signOut();
          setLocalErr(`Access denied for ${email || 'this account'}. Only authorized accounts can sign in.`);
          setSigning(false);
          return;
        }
        // onAuthStateChanged in AppRoot will pick it up from here — nothing else to do.
      })
      .catch((err) => {
        console.error('Google Sign-In error:', err);
        if (err?.code === 'auth/popup-closed-by-user' || err?.code === 'auth/cancelled-popup-request') {
          setSigning(false);
          return;
        }
        setLocalErr(err?.message || 'Sign-in failed. Please try again.');
        setSigning(false);
      });
  };

  const shownError = localErr || error;

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="card p-8 max-w-md w-full shadow-sm text-center">
        <div className="w-12 h-12 rounded-xl bg-blue-600 text-white mx-auto mb-4 flex items-center justify-center text-2xl">✓</div>
        <h1 className="text-2xl font-semibold text-slate-900 mb-1">Next Level Orthodontics</h1>
        <p className="text-slate-500 mb-6 text-sm">Checklists — sign in with your NLO Google account to sync across devices.</p>
        <button
          onClick={handleSignIn}
          disabled={signing}
          className="w-full flex items-center justify-center gap-3 bg-white border-2 border-slate-200 hover:border-slate-300 hover:bg-slate-50 disabled:opacity-50 text-slate-700 font-semibold py-3 rounded-xl transition-colors">
          <svg width="20" height="20" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
          </svg>
          {signing ? 'Signing in…' : 'Sign in with Google'}
        </button>
        {shownError && <p className="mt-4 text-sm text-red-700 bg-red-50 rounded-lg p-3">{shownError}</p>}
        <p className="mt-4 text-xs text-slate-400">
          Allowed: <strong>@{ALLOWED_DOMAIN}</strong> accounts. You'll only see this once per device.
        </p>
      </div>
    </div>
  );
}

/* ============================================================
   LOGIN
   ============================================================ */
function Login({ staff, onPick }) {
  const [pendingAdmin, setPendingAdmin] = useState(null);
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const handlePick = (s) => {
    if (s.appRole === 'admin') {
      setPendingAdmin(s);
      setPassword('');
      setError('');
    } else {
      onPick(s.id);
    }
  };

  const submit = () => {
    if (!pendingAdmin) return;
    if (password === (pendingAdmin.password || 'changeme')) {
      onPick(pendingAdmin.id);
    } else {
      setError('Incorrect password.');
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center p-6">
      <div className="card p-8 max-w-md w-full shadow-sm">
        <h1 className="text-2xl font-semibold text-slate-900 mb-1">Next Level Orthodontic</h1>
        <p className="text-slate-500 mb-6 text-sm">Checklists — who's using this device?</p>
        <div className="space-y-2">
          {staff.map(s => (
            <button key={s.id} onClick={() => handlePick(s)}
              className="w-full text-left px-4 py-3 border border-slate-200 rounded-lg hover:bg-slate-50 transition flex items-center justify-between">
              <div>
                <div className="font-medium text-slate-900">{s.name}</div>
                <div className="text-xs text-slate-500 flex items-center gap-1">
                  {s.appRole === 'admin'
                    ? <>Admin <span title="Password required">🔒</span></>
                    : 'Staff'}
                </div>
              </div>
              <span className="text-slate-400">›</span>
            </button>
          ))}
        </div>
      </div>
      {pendingAdmin && (
        <Modal title={`Sign in — ${pendingAdmin.name}`} onClose={() => setPendingAdmin(null)}>
          <div className="space-y-3">
            <div className="text-sm text-slate-600">Admin access is password-protected. Enter your password to continue.</div>
            <input type="password" className="input" autoFocus value={password}
              onChange={e => { setPassword(e.target.value); setError(''); }}
              onKeyDown={e => e.key === 'Enter' && submit()}
              placeholder="Admin password" />
            {error && <div className="text-xs text-red-600">{error}</div>}
          </div>
          <div className="flex justify-end gap-2 mt-5">
            <button className="btn btn-secondary" onClick={() => setPendingAdmin(null)}>Cancel</button>
            <button className="btn btn-primary" onClick={submit} disabled={!password}>Sign in</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ============================================================
   STAFF VIEW
   ============================================================ */
function StaffView({ state, dispatch, user }) {
  const [tab, setTab] = useState('mine');
  const myRoleIds = user.roleIds || [];
  const roleNames = state.roles.filter(r => myRoleIds.includes(r.id)).map(r => r.name);

  const openToday = state.instances.filter(i => i.status !== 'completed');
  // "My Checklists" tab: instances where I'm in the assignee list
  // (falls back to role membership for legacy instances without assignedStaffIds).
  const myTeam = openToday.filter(i =>
    (i.assignedStaffIds && i.assignedStaffIds.length > 0)
      ? i.assignedStaffIds.includes(user.id)
      : myRoleIds.includes(i.roleId)
  );
  // Browse tab: checklists I'm NOT on, where no specific item is claimed
  // by any individual — truly pick-up-able work.
  const others   = openToday.filter(i => !myTeam.includes(i) && i.items.every(it => !it.assignedTo));

  const mineItems = myTeam.filter(i => i.items.some(it => it.assignedTo === user.id && it.status !== 'done'));
  const teamRest  = myTeam.filter(i => !mineItems.includes(i));
  const completedToday = state.instances.filter(i => i.status === 'completed' && i.date === todayISO()).slice(0, 30);

  // Group helper: by role (for browse) & by "when" (for mine/team)
  const byRole = (list) => {
    const groups = {};
    list.forEach(i => { (groups[i.roleId] ||= []).push(i); });
    return Object.entries(groups).map(([rid, items]) => ({ role: state.roles.find(r => r.id === rid), items }));
  };

  return (
    <main className="max-w-6xl mx-auto p-4 sm:p-6 space-y-4 flex-1">
      <FailedInspectionsBanner user={user} state={state} dispatch={dispatch} />
      <div className="card p-3 bg-amber-50 border-amber-300 text-amber-900 text-sm flex items-start gap-3">
        <div className="text-lg leading-none mt-0.5">📋</div>
        <div>
          <strong>Checklist compliance matters.</strong> Completing and certifying your assigned checklists on time, and passing random inspections, are important factors in your performance review.
        </div>
      </div>
      <ComplianceCard user={user} state={state} />
      {roleNames.length === 0 && (
        <div className="card p-4 bg-amber-50 border-amber-200 text-amber-900 text-sm">
          You haven't been added to any role yet. Ask your admin to assign you to one.
        </div>
      )}

      <div className="flex flex-wrap gap-1 border-b border-slate-200 -mx-2 px-2">
        {[
          ['mine',   `My Checklists ${roleNames.length ? `(${roleNames.join(', ')})` : ''}`],
          ['browse', 'Browse all checklists'],
          ['done',   'Completed today'],
        ].map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)}
            className={`px-3 py-2 text-sm font-medium border-b-2 -mb-px whitespace-nowrap ${tab === k ? 'tab-active' : 'border-transparent text-slate-600 hover:text-slate-900'}`}>{l}</button>
        ))}
      </div>

      {tab === 'mine' && (
        <>
          <Section title="My tasks today" count={mineItems.length} empty="Nothing specifically assigned to you right now.">
            {mineItems.map(inst => <InstanceCard key={inst.id} inst={inst} state={state} dispatch={dispatch} user={user} highlightAssignee={user.id} />)}
          </Section>
          <Section title="My team's checklists" count={teamRest.length} empty="Your team has nothing else pending.">
            {teamRest.map(inst => <InstanceCard key={inst.id} inst={inst} state={state} dispatch={dispatch} user={user} />)}
          </Section>
        </>
      )}

      {tab === 'browse' && (
        <>
          <div className="text-sm text-slate-500">Open checklists from other roles that haven't been claimed by a specific person. Feel free to pick up any item.</div>
          {byRole(others).length === 0 && <div className="card p-6 text-center text-slate-400 text-sm">Nothing unclaimed right now — every open checklist has someone assigned.</div>}
          {byRole(others).map(({ role, items }) => (
            <Section key={role?.id || 'none'} title={role?.name || 'Unassigned role'} count={items.length}>
              {items.map(inst => <InstanceCard key={inst.id} inst={inst} state={state} dispatch={dispatch} user={user} />)}
            </Section>
          ))}
        </>
      )}

      {tab === 'done' && (
        <Section title="Completed today" count={completedToday.length} empty="No completed checklists yet today.">
          {completedToday.map(inst => <InstanceCard key={inst.id} inst={inst} state={state} dispatch={dispatch} user={user} readOnly />)}
        </Section>
      )}
    </main>
  );
}

/* ============================================================
   ADMIN VIEW
   ============================================================ */
function AdminView({ state, dispatch, user }) {
  const [tab, setTab] = useState('today');

  // Admin scope: owner sees everyone; scoped admin sees themselves + their managedStaffIds.
  const scope = useMemo(() => {
    const isOwner = !!user.isOwner;
    const visibleStaffIds = new Set(isOwner
      ? state.staff.map(s => s.id)
      : [user.id, ...(user.managedStaffIds || [])]);
    const visibleRoleIds = new Set();
    state.staff.forEach(s => {
      if (visibleStaffIds.has(s.id)) (s.roleIds || []).forEach(r => visibleRoleIds.add(r));
    });
    return {
      isOwner,
      visibleStaffIds,
      visibleRoleIds,
      canSeeInstance: (inst) => {
        // Prefer explicit assignee list; fall back to role membership.
        if (inst.assignedStaffIds && inst.assignedStaffIds.length > 0) {
          return inst.assignedStaffIds.some(id => visibleStaffIds.has(id));
        }
        return visibleRoleIds.has(inst.roleId);
      },
      canSeeStaff: (id) => visibleStaffIds.has(id),
    };
  }, [state.staff, user]);

  const overdue = useMemo(
    () => state.instances.filter(i => i.status !== 'completed' && i.dueAt < now() && scope.canSeeInstance(i)),
    [state.instances, scope]
  );

  useEffect(() => {
    overdue.forEach(i => { if (!i.adminNotifiedAt) dispatch({ type: 'INSTANCE_MARK_NOTIFIED', id: i.id }); });
  }, [overdue.length]);

  return (
    <main className="max-w-6xl mx-auto p-4 sm:p-6 space-y-4 flex-1">
      {(user.roleIds || []).length > 0 && <FailedInspectionsBanner user={user} state={state} dispatch={dispatch} />}
      {(user.roleIds || []).length > 0 && <ComplianceCard user={user} state={state} />}
      {overdue.length > 0 && (
        <div className="card border-red-200 bg-red-50 p-4">
          <div className="flex items-start gap-3">
            <div className="text-red-600 mt-0.5">⚠️</div>
            <div className="flex-1">
              <div className="font-semibold text-red-900">{overdue.length} overdue checklist{overdue.length > 1 ? 's' : ''}</div>
              <ul className="mt-2 space-y-1 text-sm text-red-800">
                {overdue.slice(0, 6).map(i => {
                  const role = state.roles.find(r => r.id === i.roleId);
                  return (
                    <li key={i.id}>
                      <span className="font-medium">{i.checklistName}</span>
                      {i.kind === 'event' && i.appointmentLabel && <> — {i.appointmentLabel}</>}
                      <span className="text-red-600"> ({role?.name || '?'} · {fmtRel(i.dueAt)})</span>
                    </li>
                  );
                })}
                {overdue.length > 6 && <li className="text-red-600">+ {overdue.length - 6} more</li>}
              </ul>
            </div>
          </div>
        </div>
      )}

      <div className="flex flex-wrap gap-1 border-b border-slate-200 -mx-2 px-2 overflow-x-auto">
        {[
          ['today',     'Today'],
          ['recurring', 'Recurring'],
          ['event',     'Event-Triggered'],
          ['roles',     'Roles'],
          ['staff',     'Staff'],
          ['audit',     'Audit Log'],
          scope.isOwner ? ['settings', 'Settings'] : null,
        ].filter(Boolean).map(([k, l]) => (
          <button key={k} onClick={() => setTab(k)}
            className={`px-3 py-2 text-sm font-medium border-b-2 -mb-px whitespace-nowrap ${tab === k ? 'tab-active' : 'border-transparent text-slate-600 hover:text-slate-900'}`}>{l}</button>
        ))}
      </div>

      {!scope.isOwner && (
        <div className="text-xs text-slate-500">
          Managing {scope.visibleStaffIds.size - 1} staff · some records are outside your scope and hidden.
        </div>
      )}
      {scope.isOwner && (
        <div className="flex justify-end">
          <button
            onClick={() => {
              if (confirm('Add ~15 days of simulated past checklist data (plus a couple of inspections) so the compliance card and audit log have real content? You can always keep adding real data on top.')) {
                dispatch({ type: 'SEED_DEMO' });
              }
            }}
            className="text-xs text-slate-400 hover:text-slate-600 underline">
            [demo] Seed sample history
          </button>
        </div>
      )}
      {tab === 'today'     && <TodayTab     state={state} dispatch={dispatch} user={user} scope={scope} />}
      {tab === 'recurring' && <ChecklistDefsTab kind="recurring" state={state} dispatch={dispatch} user={user} scope={scope} />}
      {tab === 'event'     && <ChecklistDefsTab kind="event"     state={state} dispatch={dispatch} user={user} scope={scope} />}
      {tab === 'roles'     && <RolesTab     state={state} dispatch={dispatch} scope={scope} />}
      {tab === 'staff'     && <StaffTab     state={state} dispatch={dispatch} scope={scope} user={user} />}

/* ============================================================
   RANDOM INSPECTION
   ============================================================ */
function InspectionDialog({ state, user, scope, onClose, onSubmit }) {
  const [stage, setStage] = useState('configure');
  const [sampleSize, setSampleSize] = useState(5);
  const [windowDays, setWindowDays] = useState(7);
  const [sample, setSample] = useState([]);
  const [results, setResults] = useState({});

  const start = () => {
    const cutoff = now() - windowDays * 86400000;
    const candidates = [];
    state.instances.forEach(inst => {
      if (scope && !scope.canSeeInstance(inst)) return;
      inst.items.forEach(it => {
        if (it.status !== 'done' || !it.completedAt || it.completedAt < cutoff) return;
        candidates.push({
          instanceId: inst.id,
          itemId: it.id,
          itemLabel: it.label,
          checklistName: inst.checklistName,
          appointmentLabel: inst.appointmentLabel,
          completedByName: state.staff.find(s => s.id === it.completedBy)?.name || 'Unknown',
          completedAt: it.completedAt,
          date: inst.date,
        });
      });
    });
    // Fisher–Yates-ish shuffle
    const shuffled = [...candidates].sort(() => Math.random() - 0.5);
    setSample(shuffled.slice(0, sampleSize));
    setStage('review');
  };

  const setResult = (key, patch) => setResults(r => ({ ...r, [key]: { ...r[key], ...patch } }));

  const addPhoto = async (key, file) => {
    try {
      const dataUrl = await compressImage(file);
      setResults(r => ({ ...r, [key]: { ...r[key], photos: [...(r[key]?.photos || []), dataUrl] } }));
    } catch (e) {
      alert('Could not process photo. ' + (e?.message || ''));
    }
  };
  const removePhoto = (key, idx) => setResults(r => ({
    ...r, [key]: { ...r[key], photos: (r[key]?.photos || []).filter((_, i) => i !== idx) }
  }));

  const submit = () => {
    const payload = sample.map(s => {
      const key = `${s.instanceId}-${s.itemId}`;
      const r = results[key] || {};
      return {
        instanceId: s.instanceId,
        itemId: s.itemId,
        itemLabel: s.itemLabel,
        completedByName: s.completedByName,
        result: r.result,
        note: r.note || '',
        photos: r.photos || [],
      };
    }).filter(p => p.result === 'pass' || p.result === 'fail');
    onSubmit(payload);
  };

  if (stage === 'configure') {
    return (
      <Modal title="Random inspection" onClose={onClose}>
        <div className="space-y-4">
          <p className="text-sm text-slate-600">
            The app will randomly pick completed items for you to physically verify.
            Mark each as pass or fail — the results are permanently logged to the audit log.
          </p>
          <div className="grid sm:grid-cols-2 gap-3">
            <Field label="How many items?">
              <select className="input" value={sampleSize} onChange={e => setSampleSize(parseInt(e.target.value))}>
                <option value={3}>3 items</option>
                <option value={5}>5 items</option>
                <option value={10}>10 items</option>
              </select>
            </Field>
            <Field label="From when?">
              <select className="input" value={windowDays} onChange={e => setWindowDays(parseInt(e.target.value))}>
                <option value={1}>Today</option>
                <option value={7}>Last 7 days</option>
                <option value={30}>Last 30 days</option>
              </select>
            </Field>
          </div>
        </div>
        <div className="flex justify-end gap-2 mt-6">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={start}>🎲 Pick random items</button>
        </div>
      </Modal>
    );
  }

  // Review stage
  const anyMarked = sample.some(s => {
    const r = results[`${s.instanceId}-${s.itemId}`];
    return r && (r.result === 'pass' || r.result === 'fail');
  });

  return (
    <Modal title={`Inspection — review ${sample.length} item${sample.length === 1 ? '' : 's'}`} onClose={onClose} wide>
      {sample.length === 0 ? (
        <div className="text-sm text-slate-600">
          No completed items in the selected window to inspect. Try a longer window or wait until staff complete some checklists.
        </div>
      ) : (
        <div className="space-y-3">
          <div className="text-xs text-slate-500">Walk over and physically verify each item was actually done. Mark pass or fail. Notes are optional but live in the audit log.</div>
          {sample.map(s => {
            const key = `${s.instanceId}-${s.itemId}`;
            const r = results[key] || {};
            return (
              <div key={key} className="card p-3 border-slate-200">
                <div className="flex items-start justify-between gap-3 flex-wrap">
                  <div className="flex-1 min-w-[200px]">
                    <div className="font-medium text-slate-900">{s.itemLabel}</div>
                    <div className="text-xs text-slate-500">
                      {s.checklistName}{s.appointmentLabel ? ` — ${s.appointmentLabel}` : ''} · {s.date}
                    </div>
                    <div className="text-xs text-slate-500 mt-0.5">
                      Completed by <strong className="text-slate-700">{s.completedByName}</strong> {fmtRel(s.completedAt)}
                    </div>
                  </div>
                  <div className="flex gap-1">
                    <button className={r.result === 'pass' ? 'btn btn-success' : 'btn btn-secondary'}
                      onClick={() => setResult(key, { result: 'pass' })}>✓ Pass</button>
                    <button className={r.result === 'fail' ? 'btn btn-danger' : 'btn btn-secondary'}
                      onClick={() => setResult(key, { result: 'fail' })}>✗ Fail</button>
                  </div>
                </div>
                {r.result && (
                  <>
                    <input className="input mt-2 text-sm" placeholder="Note (optional) — e.g. 'surface not wiped'"
                      value={r.note || ''} onChange={e => setResult(key, { note: e.target.value })} />
                    <div className="flex items-center gap-2 mt-2 flex-wrap">
                      <label className="btn btn-secondary text-xs cursor-pointer">
                        📷 Add photo
                        <input type="file" accept="image/*" capture="environment" className="hidden"
                          onChange={e => {
                            const f = e.target.files?.[0];
                            if (f) addPhoto(key, f);
                            e.target.value = '';
                          }} />
                      </label>
                      {(r.photos || []).map((src, i) => (
                        <div key={i} className="relative group">
                          <img src={src} alt={`photo ${i+1}`}
                            className="w-14 h-14 object-cover rounded border border-slate-300" />
                          <button onClick={() => removePhoto(key, i)}
                            className="absolute -top-1.5 -right-1.5 w-5 h-5 rounded-full bg-red-600 text-white text-xs leading-none hover:bg-red-700"
                            title="Remove photo">✕</button>
                        </div>
                      ))}
                      {(r.photos || []).length === 0 && (
                        <span className="text-xs text-slate-400">Optional. Tap to capture on phone.</span>
                      )}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
      <div className="flex justify-between items-center gap-2 mt-6">
        <button className="btn btn-ghost" onClick={() => { setStage('configure'); setResults({}); }}>← Re-pick</button>
        <div className="flex gap-2">
          <button className="btn btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-primary" onClick={submit} disabled={!anyMarked}>Submit inspection</button>
        </div>
      </div>
    </Modal>
  );
}
